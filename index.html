<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MARKET PRO - SINIRSIZ (IndexedDB)</title>
    <script src="https://unpkg.com/@ericblade/quagga2@1.8.2/dist/quagga.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
        body { background: #1a1a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .app-container { max-width: 450px; width: 100%; background: #1a1a1a; border-radius: 48px; padding: 20px; }
        .stats-area { display: flex; gap: 12px; margin-bottom: 20px; }
        .stat-card { background: #2a2a2a; border-radius: 28px; padding: 12px; flex: 1; text-align: center; }
        .stat-label { font-size: 0.7rem; color: #ffaa88; text-transform: uppercase; }
        .stat-value { font-size: 1.3rem; font-weight: 800; color: #ff6666; }
        .result-area { background: #2a2a2a; border-radius: 32px; padding: 20px; text-align: center; margin-bottom: 20px; min-height: 200px; }
        .result-placeholder { color: #888; font-size: 0.9rem; font-weight: 600; }
        .result-price { font-size: 2rem; font-weight: 900; color: #ff4444; margin: 8px 0; }
        .result-name { font-size: 1.1rem; font-weight: 800; color: #ffaa88; text-transform: uppercase; }
        .product-image { max-width: 100%; max-height: 120px; border-radius: 20px; margin: 8px auto; display: block; object-fit: contain; background: #3a3a3a; }
        button, .btn { background: #2c6e2f; border: none; border-radius: 40px; padding: 12px; color: white; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn { background: #d4c9b8; color: #c0392b; box-shadow: 0 3px 0 #8f7a5c; transition: 0.05s linear; display: inline-block; text-align: center; }
        .btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #8f7a5c; }
        .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .search-box input { width: 100%; padding: 12px; border-radius: 60px; border: none; background: #2a2a2a; color: white; text-align: center; }
        .search-results { background: #2a2a2a; border-radius: 28px; margin-top: 8px; max-height: 200px; overflow-y: auto; position: absolute; width: 85%; z-index: 100; }
        .camera-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; flex-direction: column; }
        .camera-modal .video-container { width: 90%; max-width: 400px; background: #000; border-radius: 32px; overflow: hidden; margin-bottom: 20px; }
        .camera-modal video { width: 100%; display: block; }
        .skt-button { background: #2a2a2a; border-radius: 28px; padding: 12px; margin-top: 20px; text-align: center; cursor: pointer; }
        .skt-title { font-size: 0.8rem; font-weight: 700; color: #ff8888; text-transform: uppercase; }
        .skt-message { font-size: 1rem; font-weight: 800; color: #ff4444; text-transform: uppercase; }
        .skt-message.normal { color: #ffaa88; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #2a2a2a; width: 90%; max-width: 450px; border-radius: 48px; padding: 20px; max-height: 85%; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .modal-title { color: #ff6666; font-weight: 800; }
        .close-modal-btn { background: #c0392b; padding: 6px 14px; border-radius: 40px; }
        .product-list-simple { display: flex; flex-direction: column; gap: 8px; }
        .product-name-item { background: #3a3a3a; border-radius: 40px; padding: 12px; cursor: pointer; text-align: center; font-weight: bold; }
        .product-detail-card { border-radius: 32px; padding: 16px; margin-top: 16px; text-align: center; }
        .detail-image { max-width: 100%; max-height: 120px; border-radius: 20px; margin: 8px auto; }
        .expiry-red { background: #ff4444 !important; color: white; }
        .expiry-yellow { background: #ffaa33 !important; color: #1a1a1a; }
        .expiry-green { background: #2ecc71 !important; color: white; }
        .expiry-no-date { background: #5a5a5a !important; color: #ccc; }
        .hidden { display: none; }
        input, select { width: 100%; padding: 10px; border-radius: 40px; border: none; background: #555; color: white; margin: 4px 0; }
        .detail-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 10px; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="stats-area">
        <div class="stat-card"><div class="stat-label">📦 TOPLAM ENVANTER</div><div class="stat-value" id="totalInventory">0 €</div></div>
        <div class="stat-card"><div class="stat-label">💰 POTANSİYEL KÂR</div><div class="stat-value" id="totalProfit">0 €</div></div>
    </div>
    <div class="result-area" id="resultArea"><div class="result-placeholder">🎯 BARKOD OKUTUNCA VEYA<br>MANUEL ARAMA YAPINCA<br>FİYAT GÖRÜNÜR</div></div>
    <div class="search-box"><input type="text" id="manualSearchInput" placeholder="🔍 Ürün adı veya barkod ile ara..."><div id="searchResults" class="search-results" style="display: none;"></div></div>
    <div class="button-grid"><button class="btn" id="searchBtn">📷 FİYAT SORGULA</button><button class="btn" id="addBtn">➕ ÜRÜN EKLE</button><button class="btn" id="inventoryBtn">📋 ENVANTER</button><button class="btn" id="settingsBtn">⚙️ AYARLAR</button></div>
    <div id="addFormContainer" class="hidden"></div>
    <div class="skt-button" id="sktButton"><div class="skt-title">⚠️ SKT YAKIN ÜRÜNLER</div><div class="skt-message" id="sktMessage">YÜKLENİYOR...</div></div>
</div>

<div id="cameraModal" class="camera-modal"><div class="video-container"><video id="cameraVideo" autoplay muted playsinline></video></div><button id="closeCameraModalBtn">✖ KAPAT</button><div id="cameraModalStatus" class="status">📷 KAMERA BAŞLATILIYOR...</div></div>
<div id="inventoryModal" class="modal"><div class="modal-content"><div class="modal-header"><span class="modal-title">📦 ENVANTER</span><button class="close-modal-btn" onclick="closeInventoryModal()">✖ KAPAT</button></div><div id="modalProductList" class="product-list-simple"></div><div id="productDetailArea"></div></div></div>
<div id="sktModal" class="modal"><div class="modal-content"><div class="modal-header"><span class="modal-title">⚠️ SKT YAKIN ÜRÜNLER</span><button class="close-modal-btn" onclick="closeSktModal()">✖ KAPAT</button></div><div id="sktProductList"></div></div></div>
<div id="settingsModal" class="modal"><div class="modal-content"><div class="modal-header"><span class="modal-title">⚙️ AYARLAR</span><button class="close-modal-btn" onclick="closeSettingsModal()">✖ KAPAT</button></div><button onclick="backupData()">💾 YEDEK AL</button><button onclick="restoreData()" style="margin-top:10px;">📂 GERİ YÜKLE</button><button onclick="clearAllData()" style="margin-top:10px; background:#c0392b;">🗑️ TÜM VERİLERİ SİL</button><button onclick="compressAllImages()" style="margin-top:10px; background:#f39c12;">🖼️ TÜM RESİMLERİ SIKIŞTIR</button></div></div>

<script>
    let db = null;
    let products = [];      // cache
    let currentStream = null;
    let lastScannedProduct = null;
    let quaggaActive = false;
    let tempImageData = null;

    // === INDEXEDDB BAŞLAT ===
    function initDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open("MarketProIDB", 2);
            request.onerror = (e) => reject(e);
            request.onsuccess = (e) => {
                db = e.target.result;
                resolve();
            };
            request.onupgradeneeded = (e) => {
                const dbTemp = e.target.result;
                if (!dbTemp.objectStoreNames.contains("products")) {
                    const store = dbTemp.createObjectStore("products", { keyPath: "id", autoIncrement: true });
                    store.createIndex("barcode", "barcode", { unique: false });
                }
            };
        });
    }

    async function loadProducts() {
        return new Promise((resolve, reject) => {
            if (!db) { reject("DB yok"); return; }
            const tx = db.transaction(["products"], "readonly");
            const store = tx.objectStore("products");
            const request = store.getAll();
            request.onsuccess = () => {
                products = request.result || [];
                resolve();
            };
            request.onerror = (e) => reject(e);
        });
    }

    async function saveProducts() {
        return new Promise((resolve, reject) => {
            if (!db) { reject("DB yok"); return; }
            const tx = db.transaction(["products"], "readwrite");
            const store = tx.objectStore("products");
            store.clear();
            for (let p of products) {
                store.add(p);
            }
            tx.oncomplete = () => resolve();
            tx.onerror = (e) => reject(e);
        });
    }

    // Resim sıkıştırma
    async function compressImage(dataUrl, maxWidth = 400, quality = 0.4) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let w = img.width, h = img.height;
                if (w > maxWidth) { h = (h * maxWidth) / w; w = maxWidth; }
                canvas.width = w; canvas.height = h;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, w, h);
                resolve(canvas.toDataURL('image/jpeg', quality));
            };
            img.src = dataUrl;
        });
    }

    async function compressAllImages() {
        let count = 0;
        for (let i = 0; i < products.length; i++) {
            if (products[i].image && products[i].image.length > 60000) {
                products[i].image = await compressImage(products[i].image, 400, 0.4);
                count++;
            }
        }
        if (count > 0) {
            await saveProducts();
            alert(`${count} resim sıkıştırıldı!`);
        } else {
            alert("Sıkıştırılacak büyük resim yok.");
        }
        updateUI();
    }

    // Renk ve UI
    function getExpiryColor(expiry) {
        if (!expiry) return "expiry-no-date";
        const diff = Math.ceil((new Date(expiry) - new Date()) / 86400000);
        if (diff <= 7) return "expiry-red";
        if (diff <= 14) return "expiry-yellow";
        return "expiry-green";
    }

    async function calculateStats() {
        let totalInv = 0, totalProfit = 0;
        for (let p of products) {
            totalInv += p.price * p.quantity;
            if (p.cost) totalProfit += (p.price - p.cost) * p.quantity;
        }
        return { totalInv, totalProfit };
    }

    async function updateUI() {
        const stats = await calculateStats();
        document.getElementById("totalInventory").innerHTML = stats.totalInv.toFixed(2) + " €";
        document.getElementById("totalProfit").innerHTML = stats.totalProfit.toFixed(2) + " €";
        
        const today = new Date();
        const warnings = products.filter(p => p.expiry && Math.ceil((new Date(p.expiry) - today) / 86400000) <= 5);
        const msg = document.getElementById("sktMessage");
        if (warnings.length === 0) { msg.innerHTML = "YAKIN ÜRÜN YOK"; msg.className = "skt-message normal"; }
        else { msg.innerHTML = `${warnings.length} ÜRÜN YAKIN`; msg.className = "skt-message"; }
    }

    function showResult(product) {
        if (!product) return;
        lastScannedProduct = product;
        const area = document.getElementById("resultArea");
        area.innerHTML = `
            ${product.image ? `<img src="${product.image}" class="product-image" onerror="this.src='';">` : '<div>📷 RESİM YOK</div>'}
            <div class="result-name">${escapeHtml(product.name)}</div>
            <div class="result-price">${product.price.toFixed(2)} €</div>
            <div>STOK: ${product.quantity} | SKT: ${product.expiry || "YOK"}</div>
            <button onclick="enableInlineEdit()" style="margin-top:10px;">📝 DÜZENLE</button>
        `;
    }

    function enableInlineEdit() {
        if (!lastScannedProduct) return;
        const p = lastScannedProduct;
        document.getElementById("resultArea").innerHTML = `
            <div><input id="editName" value="${escapeHtml(p.name)}" placeholder="Ad"><input id="editBarcode" value="${p.barcode}" placeholder="Barkod"><input id="editPrice" value="${p.price}" placeholder="Fiyat"><input id="editQuantity" value="${p.quantity}" placeholder="Stok"><input id="editExpiry" value="${p.expiry || ''}" placeholder="SKT"><button onclick="saveInlineEdit()">💾 KAYDET</button><button onclick="showResult(lastScannedProduct)">İPTAL</button></div>
        `;
    }

    async function saveInlineEdit() {
        if (!lastScannedProduct) return;
        const idx = products.findIndex(p => p.barcode === lastScannedProduct.barcode);
        if (idx !== -1) {
            products[idx].name = document.getElementById("editName").value.trim().toUpperCase();
            products[idx].barcode = document.getElementById("editBarcode").value.trim();
            products[idx].price = parseFloat(document.getElementById("editPrice").value);
            products[idx].quantity = parseInt(document.getElementById("editQuantity").value);
            products[idx].expiry = document.getElementById("editExpiry").value;
            await saveProducts();
            await updateUI();
            showResult(products[idx]);
            playBeep();
        }
    }

    // KAMERA
    async function openCameraModal(mode) {
        const modal = document.getElementById("cameraModal");
        const video = document.getElementById("cameraVideo");
        const statusDiv = document.getElementById("cameraModalStatus");
        modal.style.display = "flex";
        statusDiv.innerHTML = "📷 BAŞLATILIYOR...";
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
            currentStream = stream;
            video.play();
            if (quaggaActive) Quagga.stop();
            Quagga.init({ inputStream: { name: "LiveStream", type: "LiveStream", target: video }, decoder: { readers: ["ean_reader", "ean_8_reader", "upc_reader"] } }, (err) => {
                if (err) { statusDiv.innerHTML = "HATA"; return; }
                Quagga.start();
                quaggaActive = true;
                statusDiv.innerHTML = "🎥 BARKODU GÖSTER...";
            });
            Quagga.onDetected((data) => {
                const code = data.codeResult.code;
                playBeep();
                closeCameraModal();
                if (mode === 'search') {
                    const found = products.find(p => p.barcode === code);
                    if (found) showResult(found);
                    else document.getElementById("resultArea").innerHTML = `<div>❌ "${code}" BULUNAMADI<br><button onclick="showAddFormForBarcode('${code}')">➕ EKLE</button></div>`;
                } else showAddFormForBarcode(code);
            });
        } catch(e) { statusDiv.innerHTML = "❌ KAMERA İZNİ GEREKLİ"; setTimeout(() => closeCameraModal(), 2000); }
    }

    function closeCameraModal() {
        if (quaggaActive) { Quagga.stop(); quaggaActive = false; }
        if (currentStream) { currentStream.getTracks().forEach(t => t.stop()); currentStream = null; }
        document.getElementById("cameraModal").style.display = "none";
    }

    function showAddFormForBarcode(barcode) {
        const container = document.getElementById("addFormContainer");
        container.classList.remove("hidden");
        container.innerHTML = `<div><strong>YENİ ÜRÜN</strong><input id="addBarcode" value="${barcode}"><input id="addName" placeholder="Ürün adı"><input id="addPrice" placeholder="Fiyat (€)"><input id="addQuantity" placeholder="Stok" value="1"><input id="addExpiry" placeholder="SKT"><button onclick="captureImageForAdd('gallery')">🖼️ RESİM SEÇ</button><button onclick="saveNewProduct()">💾 KAYDET</button><button onclick="closeAddForm()">İPTAL</button></div>`;
    }

    async function captureImageForAdd(source) {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = "image/*";
        if (source === 'camera') input.capture = "environment";
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = async (ev) => { tempImageData = await compressImage(ev.target.result, 400, 0.4); alert("Resim hazır!"); };
                reader.readAsDataURL(file);
            }
        };
        input.click();
    }

    async function saveNewProduct() {
        const barcode = document.getElementById("addBarcode").value.trim();
        const name = document.getElementById("addName").value.trim().toUpperCase();
        const price = parseFloat(document.getElementById("addPrice").value);
        const quantity = parseInt(document.getElementById("addQuantity").value);
        const expiry = document.getElementById("addExpiry").value;
        if (!name || !barcode || isNaN(price)) { alert("Eksik bilgi!"); return; }
        const existing = products.findIndex(p => p.barcode === barcode);
        if (existing !== -1 && confirm("Barkod var, üzerine yazılsın mı?")) {
            products[existing] = { ...products[existing], name, price, quantity, expiry, image: tempImageData || products[existing].image };
        } else {
            products.push({ barcode, name, price, quantity, expiry, image: tempImageData, cost: null, id: Date.now() });
        }
        await saveProducts();
        tempImageData = null;
        closeAddForm();
        playBeep();
        alert("Kaydedildi!");
        await updateUI();
    }

    function closeAddForm() { document.getElementById("addFormContainer").classList.add("hidden"); document.getElementById("addFormContainer").innerHTML = ""; tempImageData = null; }

    // ENVANTER MODAL
    function openInventoryModal() {
        const modal = document.getElementById("inventoryModal");
        const container = document.getElementById("modalProductList");
        if (products.length === 0) container.innerHTML = "Ürün yok";
        else {
            let html = "";
            products.forEach((p, i) => { html += `<div class="product-name-item ${getExpiryColor(p.expiry)}" onclick="showProductDetail(${i})">${escapeHtml(p.name)} (${p.quantity})</div>`; });
            container.innerHTML = html;
        }
        document.getElementById("productDetailArea").innerHTML = "";
        modal.style.display = "flex";
    }
    function closeInventoryModal() { document.getElementById("inventoryModal").style.display = "none"; }
    function showProductDetail(i) {
        const p = products[i];
        const area = document.getElementById("productDetailArea");
        area.innerHTML = `<div class="product-detail-card ${getExpiryColor(p.expiry)}"><div><strong>${escapeHtml(p.name)}</strong></div><div>${p.barcode}</div><div>Fiyat: ${p.price.toFixed(2)} €</div><div>Stok: ${p.quantity}</div><div>SKT: ${p.expiry || "YOK"}</div>${p.image ? `<img src="${p.image}" class="detail-image">` : ""}<div class="detail-actions"><button onclick="editProduct(${i})">✏️ DÜZENLE</button> <button onclick="deleteProduct(${i})">🗑️ SİL</button> <button onclick="addImageToProduct(${i})">📷 RESİM EKLE</button></div></div>`;
    }
    function editProduct(i) {
        const p = products[i];
        const area = document.getElementById("productDetailArea");
        area.innerHTML = `<div><input id="editName" value="${escapeHtml(p.name)}"><input id="editPrice" value="${p.price}"><input id="editQuantity" value="${p.quantity}"><input id="editExpiry" value="${p.expiry || ''}"><button onclick="saveEdit(${i})">💾 KAYDET</button><button onclick="showProductDetail(${i})">İPTAL</button></div>`;
    }
    async function saveEdit(i) {
        products[i].name = document.getElementById("editName").value.trim().toUpperCase();
        products[i].price = parseFloat(document.getElementById("editPrice").value);
        products[i].quantity = parseInt(document.getElementById("editQuantity").value);
        products[i].expiry = document.getElementById("editExpiry").value;
        await saveProducts();
        await updateUI();
        showProductDetail(i);
    }
    async function addImageToProduct(i) {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = "image/*";
        input.capture = "environment";
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = async (ev) => { products[i].image = await compressImage(ev.target.result, 400, 0.4); await saveProducts(); showProductDetail(i); playBeep(); };
                reader.readAsDataURL(file);
            }
        };
        input.click();
    }
    async function deleteProduct(i) { if (confirm("Silinsin mi?")) { products.splice(i, 1); await saveProducts(); await updateUI(); openInventoryModal(); } }

    function openSktModal() {
        const modal = document.getElementById("sktModal");
        const container = document.getElementById("sktProductList");
        const today = new Date();
        const warnings = products.filter(p => p.expiry && Math.ceil((new Date(p.expiry) - today) / 86400000) <= 5);
        if (warnings.length === 0) container.innerHTML = "Yakın SKT yok";
        else {
            let html = "";
            warnings.forEach(p => { html += `<div class="${getExpiryColor(p.expiry)}" style="padding:10px;margin:5px;border-radius:20px;">${escapeHtml(p.name)} - SKT: ${p.expiry}</div>`; });
            container.innerHTML = html;
        }
        modal.style.display = "flex";
    }
    function closeSktModal() { document.getElementById("sktModal").style.display = "none"; }
    function openSettingsModal() { document.getElementById("settingsModal").style.display = "flex"; }
    function closeSettingsModal() { document.getElementById("settingsModal").style.display = "none"; }
    
    async function backupData() { const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([JSON.stringify(products)])); a.download = `backup_${Date.now()}.json`; a.click(); alert("Yedek alındı"); }
    async function restoreData() { const input = document.createElement("input"); input.type = "file"; input.accept = "application/json"; input.onchange = async e => { const file = e.target.files[0]; const reader = new FileReader(); reader.onload = async ev => { try { const data = JSON.parse(ev.target.result); if (Array.isArray(data)) { products = data; await saveProducts(); alert("Yüklendi!"); location.reload(); } } catch(e) { alert("Hatalı dosya"); } }; reader.readAsText(file); }; input.click(); }
    async function clearAllData() { if (confirm("TÜM VERİLER SİLİNECEK!")) { products = []; await saveProducts(); alert("Veriler silindi, sayfa yenilenecek."); location.reload(); } }
    
    function playBeep() { try { const ctx = new (window.AudioContext || window.webkitAudioContext)(); const o = ctx.createOscillator(); o.frequency.value = 880; const g = ctx.createGain(); g.gain.value = 0.1; o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime + 0.1); ctx.resume(); } catch(e) {} }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
    
    // ARAMA
    function initSearch() {
        const searchInput = document.getElementById("manualSearchInput");
        const resultsDiv = document.getElementById("searchResults");
        searchInput.addEventListener("input", () => {
            const term = searchInput.value.trim().toLowerCase();
            if (term === "") { resultsDiv.style.display = "none"; return; }
            const filtered = products.filter(p => p.name.toLowerCase().includes(term) || p.barcode.includes(term));
            if (filtered.length === 0) { resultsDiv.style.display = "none"; return; }
            let html = "";
            filtered.forEach(p => { html += `<div class="search-result-item" onclick="selectProductFromSearch('${p.barcode}')"><strong>${escapeHtml(p.name)}</strong> - ${p.price.toFixed(2)} €</div>`; });
            resultsDiv.innerHTML = html;
            resultsDiv.style.display = "block";
        });
        document.addEventListener("click", (e) => { if (!searchInput.contains(e.target) && !resultsDiv.contains(e.target)) resultsDiv.style.display = "none"; });
    }
    function selectProductFromSearch(barcode) { const p = products.find(p => p.barcode === barcode); if (p) showResult(p); document.getElementById("manualSearchInput").value = ""; document.getElementById("searchResults").style.display = "none"; }
    
    document.getElementById("searchBtn").onclick = () => openCameraModal('search');

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MARKET PRO</title>
    <script src="https://unpkg.com/@ericblade/quagga2@1.8.2/dist/quagga.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: #1a1a1a;  /* %50 daha açık siyah */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* ANA KART - Fitness Pro düzeni */
        .app-container {
            max-width: 450px;
            width: 100%;
            background-color: #1a1a1a;
            border-radius: 48px;
            padding: 24px 20px;
        }

        /* 1. BÖLÜM: SKT YAKIN ÜRÜNLER (BUTON) */
        .skt-button {
            background: #2a2a2a;
            border-radius: 28px;
            padding: 16px 20px;
            margin-bottom: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #3a3a3a;
        }
        .skt-button:active {
            transform: scale(0.98);
            background: #333;
        }
        .skt-title {
            font-size: 0.8rem;
            font-weight: 700;
            color: #ff8888;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .skt-message {
            font-size: 1rem;
            font-weight: 800;
            color: #ff4444;
            text-transform: uppercase;
        }
        .skt-message.normal {
            color: #ffaa88;
        }

        /* BUTON GRUBU - 2x2 (Fitness Pro'daki gün butonları gibi, dikdörtgen, yatay geniş) */
        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 30px;
        }
        .btn {
            background: #d4c9b8;  /* kirli beyaz (%20 beyazlık) */
            border: none;
            border-radius: 28px;
            padding: 20px 12px;
            font-size: 1rem;
            font-weight: 900;
            letter-spacing: 1px;
            color: #c0392b;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 5px 0 #8f7a5c;
            text-align: center;
            aspect-ratio: 4 / 3;  /* Dikdörtgen, yatay geniş */
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #8f7a5c;
        }

        /* KAMERA KONTEYNERİ */
        .camera-container {
            display: none;
            margin: 15px 0;
            background: #2a2a2a;
            border-radius: 32px;
            padding: 12px;
        }
        .video-wrapper {
            background: #000;
            border-radius: 24px;
            overflow: hidden;
        }
        video {
            width: 100%;
            display: block;
        }
        .close-camera-btn {
            background: #444;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 12px;
            margin-top: 10px;
            width: 100%;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
        }

        /* SONUÇ ALANI (Barkod okutunca fiyat görünür) */
        .result-area {
            background: #2a2a2a;
            border-radius: 32px;
            padding: 24px 16px;
            text-align: center;
            min-height: 160px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .result-placeholder {
            color: #888;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .result-price {
            font-size: 3rem;
            font-weight: 900;
            color: #ff4444;
            margin: 8px 0;
        }
        .result-name {
            font-size: 1.2rem;
            font-weight: 800;
            color: #ffaa88;
            text-transform: uppercase;
        }
        .edit-result-btn {
            background: #c0392b;
            border: none;
            border-radius: 40px;
            padding: 10px 20px;
            margin-top: 12px;
            color: white;
            font-weight: bold;
            font-size: 0.8rem;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* MODAL (Envanter, SKT listesi, Ayarlar) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #2a2a2a;
            width: 90%;
            max-width: 450px;
            border-radius: 48px;
            padding: 24px;
            max-height: 85%;
            overflow-y: auto;
        }
        .modal-title {
            color: #ff6666;
            font-size: 1.3rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        .product-item {
            background: #3a3a3a;
            border-radius: 28px;
            padding: 14px 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .product-info {
            color: #eee;
            flex: 1;
        }
        .product-actions {
            display: flex;
            gap: 12px;
        }
        .edit-product-btn, .delete-product-btn {
            background: #c0392b;
            border: none;
            border-radius: 40px;
            padding: 8px 16px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .delete-product-btn {
            background: #555;
        }
        .close-modal {
            background: #444;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 12px;
            width: 100%;
            margin-top: 16px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
        }

        /* ÜRÜN EKLEME FORMU (Kamera ile ekle sonrası tek ekran) */
        .add-product-form {
            background: #3a3a3a;
            border-radius: 32px;
            padding: 20px;
            margin-top: 15px;
        }
        .add-product-form input {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border-radius: 40px;
            border: none;
            background: #555;
            color: white;
            font-size: 1rem;
        }
        .add-product-form button {
            background: #c0392b;
            border: none;
            border-radius: 40px;
            padding: 14px;
            width: 100%;
            color: white;
            font-weight: bold;
            margin-top: 10px;
            cursor: pointer;
        }

        /* AYARLAR MODAL İÇERİĞİ */
        .settings-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .settings-buttons button {
            background: #444;
            border: none;
            border-radius: 40px;
            padding: 14px;
            color: white;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- 1. BÖLÜM: SKT YAKIN ÜRÜNLER (BUTON) -->
    <div class="skt-button" id="sktButton">
        <div class="skt-title">⚠️ SKT YAKIN ÜRÜNLER</div>
        <div class="skt-message" id="sktMessage">YÜKLENİYOR...</div>
    </div>

    <!-- 2. BÖLÜM: 4 ANA BUTON (2x2, dikdörtgen, aynı boy) -->
    <div class="button-grid">
        <button class="btn" id="searchBtn">📷 FİYAT SORGULA</button>
        <button class="btn" id="addBtn">➕ KAMERA EKLE</button>
        <button class="btn" id="inventoryBtn">📋 ENVANTER</button>
        <button class="btn" id="settingsBtn">⚙️ AYARLAR</button>
    </div>

    <!-- KAMERA ALANI (gizli) -->
    <div id="cameraContainer" class="camera-container">
        <div class="video-wrapper">
            <video id="video" autoplay muted playsinline></video>
        </div>
        <button class="close-camera-btn" onclick="closeCamera()">✖ KAPAT</button>
        <div id="cameraStatus" style="color:#aaa; text-align:center; margin-top:8px; font-size:0.7rem;"></div>
    </div>

    <!-- Ürün Ekleme Formu (kamera ile ekle sonrası burada görünecek) -->
    <div id="addFormContainer" style="display: none;"></div>

    <!-- 3. BÖLÜM: SONUÇ ALANI (Fiyat sorgulama sonucu) -->
    <div class="result-area" id="resultArea">
        <div class="result-placeholder">🎯 BARKOD OKUTUNCA<br>FİYAT GÖRÜNÜR</div>
    </div>
</div>

<!-- ENVANTER MODAL -->
<div id="inventoryModal" class="modal">
    <div class="modal-content">
        <div class="modal-title">📦 ENVANTER LİSTESİ</div>
        <div id="modalProductList"></div>
        <button class="close-modal" onclick="closeInventoryModal()">KAPAT</button>
    </div>
</div>

<!-- SKT YAKIN ÜRÜNLER MODAL -->
<div id="sktModal" class="modal">
    <div class="modal-content">
        <div class="modal-title">⚠️ SKT YAKIN ÜRÜNLER</div>
        <div id="sktProductList"></div>
        <button class="close-modal" onclick="closeSktModal()">KAPAT</button>
    </div>
</div>

<!-- AYARLAR MODAL -->
<div id="settingsModal" class="modal">
    <div class="modal-content">
        <div class="modal-title">⚙️ AYARLAR</div>
        <div class="settings-buttons">
            <button onclick="backupData()">💾 YEDEK AL</button>
            <button onclick="restoreData()">📂 GERİ YÜKLE</button>
        </div>
        <button class="close-modal" onclick="closeSettingsModal()">KAPAT</button>
    </div>
</div>

<script>
    let products = [];
    let currentStream = null;
    let currentCameraMode = null;
    let soundEnabled = true;   // ses kullanılıyor
    let lastScannedProduct = null;

    // ---------- VERİ YÖNETİMİ ----------
    function loadData() {
        const stored = localStorage.getItem("market_pro_final_v2");
        if(stored) products = JSON.parse(stored);
        else {
            products = [
                { barcode: "4003998000470", name: "ÇAYKUR RİZE ÇAYI", price: 4.99, quantity: 12, expiry: "2025-08-15", priceHistory: [4.99] },
                { barcode: "8690504003016", name: "ÜLKER ÇİKOLATA", price: 1.29, quantity: 30, expiry: "2025-06-20", priceHistory: [1.29] },
                { barcode: "8690804349850", name: "SUNTAT HİMALAYA TUZU", price: 2.99, quantity: 8, expiry: "2025-04-25", priceHistory: [2.99] }
            ];
            saveData();
        }
        updateSktButton();
    }
    function saveData() { localStorage.setItem("market_pro_final_v2", JSON.stringify(products)); }

    // SKT BUTONUNU GÜNCELLE
    function updateSktButton() {
        const today = new Date(); today.setHours(0,0,0,0);
        const warnings = products.filter(p => {
            if(!p.expiry) return false;
            const diff = Math.ceil((new Date(p.expiry) - today) / (86400000));
            return diff >= 0 && diff <= 5;
        });
        const sktMsg = document.getElementById("sktMessage");
        if(warnings.length === 0) {
            sktMsg.innerHTML = "YAKIN ÜRÜN YOK";
            sktMsg.className = "skt-message normal";
        } else {
            sktMsg.innerHTML = `${warnings.length} ÜRÜN YAKIN`;
            sktMsg.className = "skt-message";
        }
    }

    // SKT MODAL'INI AÇ
    function openSktModal() {
        const modal = document.getElementById("sktModal");
        const container = document.getElementById("sktProductList");
        const today = new Date(); today.setHours(0,0,0,0);
        const warnings = products.filter(p => {
            if(!p.expiry) return false;
            const diff = Math.ceil((new Date(p.expiry) - today) / (86400000));
            return diff >= 0 && diff <= 5;
        });
        if(warnings.length === 0) {
            container.innerHTML = "<div style='color:#aaa; text-align:center;'>YAKLAŞAN SKT ÜRÜNÜ YOK</div>";
        } else {
            let html = "";
            warnings.forEach(p => {
                const diff = Math.ceil((new Date(p.expiry) - today) / (86400000));
                html += `<div class="product-item">
                            <div class="product-info">
                                <strong>${escapeHtml(p.name)}</strong><br>
                                ${p.barcode}<br>
                                SKT: ${p.expiry} (${diff} GÜN)<br>
                                FİYAT: ${p.price.toFixed(2)} € | STOK: ${p.quantity}
                            </div>
                         </div>`;
            });
            container.innerHTML = html;
        }
        modal.style.display = "flex";
    }
    function closeSktModal() { document.getElementById("sktModal").style.display = "none"; }

    // SONUÇ GÖSTER (Fiyat sorgulama)
    function showResult(product) {
        lastScannedProduct = product;
        const resultDiv = document.getElementById("resultArea");
        resultDiv.innerHTML = `
            <div class="result-name">${escapeHtml(product.name)}</div>
            <div class="result-price">${product.price.toFixed(2)} €</div>
            <div style="color:#aaa; font-size:0.8rem;">STOK: ${product.quantity} | SKT: ${product.expiry || "YOK"}</div>
            <button class="edit-result-btn" onclick="editCurrentProduct()">✏️ FİYAT DÜZENLE</button>
        `;
    }

    function editCurrentProduct() {
        if(!lastScannedProduct) return;
        const newPrice = prompt("YENİ FİYAT (€):", lastScannedProduct.price);
        if(newPrice && !isNaN(parseFloat(newPrice))) {
            lastScannedProduct.price = parseFloat(newPrice);
            if(!lastScannedProduct.priceHistory) lastScannedProduct.priceHistory = [];
            lastScannedProduct.priceHistory.push(parseFloat(newPrice));
            saveData();
            showResult(lastScannedProduct);
            playBeep();
        }
    }

    // BİP SESİ
    function playBeep() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            osc.type = "sine";
            osc.frequency.value = 880;
            osc.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
            audioCtx.resume();
        } catch(e) {}
    }

    // KAMERA (KESİN ÇALIŞAN METOD)
    async function openCamera(mode) {
        currentCameraMode = mode;
        const videoElem = document.getElementById("video");
        const container = document.getElementById("cameraContainer");
        const statusDiv = document.getElementById("cameraStatus");
        container.style.display = "block";
        statusDiv.innerHTML = "📷 KAMERA BAŞLATILIYOR...";
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            videoElem.srcObject = stream;
            currentStream = stream;
            videoElem.play();

            Quagga.init({
                inputStream: { name: "LiveStream", type: "LiveStream", target: videoElem },
                decoder: { readers: ["ean_reader", "ean_8_reader", "code_128_reader", "upc_reader"] }
            }, function(err) {
                if(err) { statusDiv.innerHTML = "❌ HATA"; return; }
                Quagga.start();
                statusDiv.innerHTML = "🎥 BARKODU GÖSTERİN...";
            });

            Quagga.onDetected((data) => {
                const code = data.codeResult.code;
                playBeep();
                closeCamera();
                
                if(mode === 'search') {
                    const found = products.find(p => p.barcode === code);
                    if(found) showResult(found);
                    else {
                        document.getElementById("resultArea").innerHTML = `<div style="color:#ff6666; text-align:center; padding:20px;">❌ "${code}" BULUNAMADI<br><button onclick="showAddFormForBarcode('${code}')" style="background:#c0392b; border:none; border-radius:40px; padding:8px 16px; margin-top:10px; color:white;">➕ ÜRÜN EKLE</button></div>`;
                    }
                } 
                else if(mode === 'add') {
                    showAddFormForBarcode(code);
                }
            });
        } catch(e) {
            statusDiv.innerHTML = "❌ KAMERA İZNİ GEREKLİ!";
        }
    }

    // TEK EKRANDA ÜRÜN EKLEME FORMU (tüm alanlar aynı anda)
    function showAddFormForBarcode(barcode) {
        const container = document.getElementById("addFormContainer");
        container.style.display = "block";
        container.innerHTML = `
            <div class="add-product-form">
                <h3 style="color:#ffaa88; text-align:center;">YENİ ÜRÜN EKLE</h3>
                <input type="text" id="addBarcode" value="${barcode}" readonly>
                <input type="text" id="addName" placeholder="ÜRÜN ADI">
                <input type="number" step="0.01" id="addPrice" placeholder="FİYAT (€)">
                <input type="number" id="addQuantity" placeholder="ADET" value="1">
                <input type="date" id="addExpiry" placeholder="SKT (YYYY-AA-GG)">
                <button onclick="saveNewProduct()">💾 KAYDET</button>
                <button onclick="closeAddForm()" style="background:#555;">İPTAL</button>
            </div>
        `;
        // Sonuç alanını temizleme
        document.getElementById("resultArea").innerHTML = `<div class="result-placeholder">🎯 BARKOD OKUTUNCA<br>FİYAT GÖRÜNÜR</div>`;
    }

    function saveNewProduct() {
        const barcode = document.getElementById("addBarcode").value;
        const name = document.getElementById("addName").value.trim().toUpperCase();
        const price = parseFloat(document.getElementById("addPrice").value);
        const quantity = parseInt(document.getElementById("addQuantity").value) || 1;
        const expiry = document.getElementById("addExpiry").value;
        if(!name || isNaN(price)) {
            alert("ÜRÜN ADI VE FİYAT GEREKLİ!");
            return;
        }
        const existing = products.findIndex(p => p.barcode === barcode);
        if(existing !== -1) {
            if(confirm("BARKOD ZATEN VAR! ÜZERİNE YAZILSIN MI?")) {
                products[existing] = { ...products[existing], name, price, quantity, expiry };
                saveData();
                alert("GÜNCELLENDİ");
            }
        } else {
            products.push({ barcode, name, price, quantity, expiry, priceHistory: [price] });
            saveData();
            alert("ÜRÜN EKLENDİ");
        }
        updateSktButton();
        closeAddForm();
    }

    function closeAddForm() {
        document.getElementById("addFormContainer").style.display = "none";
        document.getElementById("addFormContainer").innerHTML = "";
    }

    function closeCamera() {
        if(Quagga) Quagga.stop();
        if(currentStream) { currentStream.getTracks().forEach(t => t.stop()); currentStream = null; }
        document.getElementById("cameraContainer").style.display = "none";
        const video = document.getElementById("video");
        if(video.srcObject) video.srcObject = null;
    }

    // ENVANTER MODAL (kalem ve çöp butonlu)
    function openInventoryModal() {
        const modal = document.getElementById("inventoryModal");
        const container = document.getElementById("modalProductList");
        if(products.length === 0) {
            container.innerHTML = "<div style='color:#aaa; text-align:center;'>ÜRÜN YOK</div>";
        } else {
            let html = "";
            products.forEach((p, idx) => {
                html += `<div class="product-item">
                            <div class="product-info">
                                <strong>${escapeHtml(p.name)}</strong><br>
                                ${p.barcode}<br>
                                FİYAT: ${p.price.toFixed(2)} € | STOK: ${p.quantity}<br>
                                SKT: ${p.expiry || "YOK"}
                            </div>
                            <div class="product-actions">
                                <button class="edit-product-btn" onclick="editProductFromModal(${idx})">✏️</button>
                                <button class="delete-product-btn" onclick="deleteProductFromModal(${idx})">🗑️</button>
                            </div>
                         </div>`;
            });
            container.innerHTML = html;
        }
        modal.style.display = "flex";
    }
    function closeInventoryModal() { document.getElementById("inventoryModal").style.display = "none"; }

    function editProductFromModal(idx) {
        const p = products[idx];
        const newName = prompt("YENİ ÜRÜN ADI:", p.name);
        const newPrice = parseFloat(prompt("YENİ FİYAT (€):", p.price));
        const newQuantity = parseInt(prompt("YENİ ADET:", p.quantity));
        const newExpiry = prompt("YENİ SKT (YYYY-AA-GG):", p.expiry || "");
        if(newName && !isNaN(newPrice) && !isNaN(newQuantity)) {
            products[idx] = { ...p, name: newName.toUpperCase(), price: newPrice, quantity: newQuantity, expiry: newExpiry };
            if(p.price !== newPrice) {
                if(!products[idx].priceHistory) products[idx].priceHistory = [];
                products[idx].priceHistory.push(newPrice);
            }
            saveData();
            updateSktButton();
            openInventoryModal(); // yenile
            playBeep();
        } else alert("GEÇERSİZ BİLGİ!");
    }

    function deleteProductFromModal(idx) {
        if(confirm(`${products[idx].name} SİLİNSİN Mİ?`)) {
            products.splice(idx,1);
            saveData();
            updateSktButton();
            openInventoryModal();
            playBeep();
        }
    }

    // AYARLAR MODAL (sadece yedekle/geri yükle)
    function openSettingsModal() {
        document.getElementById("settingsModal").style.display = "flex";
    }
    function closeSettingsModal() {
        document.getElementById("settingsModal").style.display = "none";
    }

    function backupData() {
        const dataStr = JSON.stringify(products);
        const blob = new Blob([dataStr], {type: "application/json"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `market_backup_${Date.now()}.json`;
        a.click();
        alert("YEDEK ALINDI");
    }
    function restoreData() {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = "application/json";
        input.onchange = e => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = ev => {
                try {
                    products = JSON.parse(ev.target.result);
                    saveData();
                    updateSktButton();
                    alert("YEDEK YÜKLENDİ");
                } catch(err) { alert("HATALI DOSYA"); }
            };
            reader.readAsText(file);
        };
        input.click();
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    // EVENTLER
    document.getElementById("searchBtn").onclick = () => openCamera('search');
    document.getElementById("addBtn").onclick = () => openCamera('add');
    document.getElementById("inventoryBtn").onclick = () => openInventoryModal();
    document.getElementById("settingsBtn").onclick = () => openSettingsModal();
    document.getElementById("sktButton").onclick = () => openSktModal();

    loadData();
</script>
</body>
</html>

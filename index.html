<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hamburg Market Pro v3 - Kesin Kamera</title>
    <script src="https://unpkg.com/@ericblade/quagga2@1.8.2/dist/quagga.min.js"></script>
    <style>
        :root { --bg: #f0ede8; --card: #ffffff; --text: #1e4a2f; --primary: #1e6b3b; --accent: #c0392b; }
        .dark-mode { --bg: #1a1a1a; --card: #2d2d2d; --text: #e0e0e0; --primary: #2ecc71; --accent: #ff4d4d; }
        * { box-sizing: border-box; font-family: sans-serif; transition: 0.2s; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 12px; }
        .card { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn { padding: 14px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 5px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-camera { background: #e67e22; color: white; }
        .btn-danger { background: #c0392b; color: white; }
        input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; margin-top: 8px; background: var(--card); color: var(--text); }
        #video-container { display: none; width: 100%; border-radius: 15px; overflow: hidden; margin-top: 10px; background: #000; position: relative; }
        video { width: 100%; height: auto; display: block; }
        .skt-alert { background: #ffeded; border-left: 5px solid red; padding: 10px; border-radius: 10px; margin-bottom: 10px; color: #c0392b; }
        .prod-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container" style="max-width:500px; margin:0 auto;">
    <div class="card">
        <input type="text" id="gSearch" placeholder="🔍 Ürün veya Barkod Ara..." oninput="listele()">
        <button onclick="document.body.classList.toggle('dark-mode')" class="btn" style="background:#34495e; color:white; margin-top:10px;">🌙 Gece Modu</button>
    </div>

    <div id="uyariAlani"></div>

    <div class="card">
        <h2 style="text-align:center; margin:0 0 10px 0;">🛒 Market Pro</h2>
        <div style="display: flex; gap: 10px;">
            <button onclick="kameraAc('sor')" class="btn btn-camera">📷 Fiyat Sor</button>
            <button onclick="kameraAc('ekle')" class="btn btn-camera">➕ Ürün Ekle</button>
        </div>
        
        <div id="video-container">
            <video id="video" autoplay muted playsinline></video>
            <button onclick="kameraKapat()" class="btn btn-danger">✖ Kamerayı Kapat</button>
        </div>
        <div id="sonucAlani" style="margin-top:10px; font-weight:bold; text-align:center;"></div>
    </div>

    <div class="card">
        <strong>🆕 Ürün Kaydet</strong>
        <input type="text" id="fBarkod" placeholder="Barkod">
        <input type="text" id="fAd" placeholder="Ürün Adı">
        <input type="number" step="0.01" id="fFiyat" placeholder="Fiyat €">
        <input type="date" id="fSkt">
        <button onclick="urunKaydet()" class="btn btn-primary" style="margin-top:10px;">💾 KAYDET</button>
    </div>

    <div class="card">
        <strong>📋 Ürünler</strong>
        <div id="urunListesi"></div>
    </div>
</div>

<script>
    let urunler = JSON.parse(localStorage.getItem("hamburg_v3")) || [];

    function bipSesi() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        oscillator.type = "sine";
        oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
        oscillator.connect(audioCtx.destination);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.1);
    }

    function urunKaydet() {
        const barkod = document.getElementById("fBarkod").value;
        const ad = document.getElementById("fAd").value;
        const fiyat = parseFloat(document.getElementById("fFiyat").value);
        const skt = document.getElementById("fSkt").value;

        if (!barkod || !ad || isNaN(fiyat)) return alert("Eksik alan var!");

        const idx = urunler.findIndex(u => u.barkod === barkod);
        if (idx > -1) urunler[idx] = { barkod, ad, fiyat, skt };
        else urunler.push({ barkod, ad, fiyat, skt });

        localStorage.setItem("hamburg_v3", JSON.stringify(urunler));
        listele();
        alert("Kaydedildi!");
    }

    function listele() {
        const ara = document.getElementById("gSearch").value.toLowerCase();
        const listeDiv = document.getElementById("urunListesi");
        const uyariDiv = document.getElementById("uyariAlani");
        let html = ""; let uyarilar = "";

        urunler.forEach(u => {
            if (!u.ad.toLowerCase().includes(ara) && !u.barkod.includes(ara)) return;
            
            if (u.skt) {
                const fark = Math.ceil((new Date(u.skt) - new Date()) / (1000 * 60 * 60 * 24));
                if (fark <= 5 && fark >= 0) uyarilar += `<div class="skt-alert">⚠️ ${u.ad} (SKT: ${u.skt})</div>`;
            }

            html += `<div class="prod-item">
                <div><b>${u.ad}</b><br><small>${u.barkod}</small></div>
                <div style="text-align:right"><b>${u.fiyat.toFixed(2)}€</b><br><small>${u.skt || '-'}</small></div>
            </div>`;
        });
        listeDiv.innerHTML = html; uyariDiv.innerHTML = uyarilar;
    }

    async function kameraAc(mod) {
        document.getElementById("video-container").style.display = "block";
        document.getElementById("sonucAlani").innerHTML = "Kamera başlatılıyor...";

        // Kamerayı elle başlatmayı dene
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            document.getElementById("video").srcObject = stream;
            
            Quagga.init({
                inputStream: { name: "LiveStream", type: "LiveStream", target: document.querySelector("#video") },
                decoder: { readers: ["ean_reader", "code_128_reader", "ean_8_reader"] }
            }, function(err) {
                if (err) {
                    document.getElementById("sonucAlani").innerHTML = "Hata: " + err.name;
                    return;
                }
                Quagga.start();
                document.getElementById("sonucAlani").innerHTML = "Kamera Aktif. Barkodu göster.";
            });

            Quagga.onDetected(function(data) {
                const code = data.codeResult.code;
                bipSesi();
                kameraKapat();
                if (mod === 'sor') {
                    const u = urunler.find(x => x.barkod === code);
                    if (u) document.getElementById("sonucAlani").innerHTML = `<h3>${u.ad}: ${u.fiyat.toFixed(2)}€</h3>`;
                    else { document.getElementById("sonucAlani").innerHTML = "Ürün Bulunamadı!"; document.getElementById("fBarkod").value = code; }
                } else {
                    document.getElementById("fBarkod").value = code;
                }
            });

        } catch (e) {
            document.getElementById("sonucAlani").innerHTML = "Hata: Kamera izni reddedildi veya bulunamadı.";
        }
    }

    function kameraKapat() { 
        Quagga.stop(); 
        const video = document.getElementById("video");
        if (video.srcObject) {
            video.srcObject.getTracks().forEach(track => track.stop());
        }
        document.getElementById("video-container").style.display = "none"; 
    }

    listele();
</script>
</body>
</html>

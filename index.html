<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Türk Market (Hamburg) - Güçlü Barkod Okuyucu €</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
        body { background: #f5f2eb; margin: 0; padding: 20px; }
        .container { max-width: 650px; margin: 0 auto; }
        .card { background: white; border-radius: 36px; padding: 20px; margin-bottom: 24px; box-shadow: 0 6px 14px rgba(0,0,0,0.05); }
        h1 { font-size: 1.9rem; margin: 0 0 6px 0; color: #1e4a2f; }
        .sub { color: #b45f2b; margin-bottom: 24px; border-left: 4px solid #e67e22; padding-left: 14px; font-weight: 500; }
        label { font-weight: 600; display: block; margin-top: 14px; margin-bottom: 6px; color: #3e2a21; }
        input, button { width: 100%; padding: 14px 18px; border-radius: 60px; border: 1px solid #ddd; font-size: 1rem; transition: 0.2s; }
        input:focus { outline: none; border-color: #e67e22; box-shadow: 0 0 0 2px rgba(230,126,34,0.2); }
        button { background: #1e6b3b; color: white; font-weight: bold; border: none; margin-top: 16px; cursor: pointer; }
        button:hover { background: #14532d; }
        .btn-outline { background: #f0ede8; color: #1e6b3b; border: 1px solid #ccc; margin-top: 8px; }
        .price-box { background: #eaf5ea; border-radius: 32px; padding: 20px; text-align: center; margin: 20px 0; }
        .price { font-size: 3rem; font-weight: 800; color: #c0392b; margin: 8px 0; letter-spacing: -0.5px; }
        .product-name { font-size: 1.5rem; font-weight: 700; }
        .barcode-display { font-family: monospace; background: #fff0df; padding: 8px; border-radius: 30px; font-size: 0.85rem; }
        .error { color: #c0392b; background: #ffe6e6; padding: 12px; border-radius: 28px; margin-top: 12px; }
        .success { color: #1e6b3b; background: #e0f2e0; padding: 12px; border-radius: 28px; }
        table { width: 100%; border-collapse: collapse; margin-top: 12px; }
        th, td { text-align: left; padding: 12px 4px; border-bottom: 1px solid #eee; vertical-align: middle; }
        .edit-btn, .delete-btn { background: none; border: none; font-size: 1.25rem; cursor: pointer; padding: 6px 10px; margin: 0; width: auto; border-radius: 40px; }
        .edit-btn { color: #e67e22; }
        .delete-btn { color: #a00; }
        .camera-btn { background: #e67e22; margin-top: 8px; }
        .flex-row { display: flex; gap: 10px; align-items: center; }
        .flex-row input { flex: 1; margin: 0; }
        .flex-row button { flex: 0 0 auto; width: auto; padding: 14px 22px; margin-top: 0; }
        @media (max-width: 500px) { .flex-row { flex-direction: column; } .flex-row button { width: 100%; } }
        #video-preview { width: 100%; max-width: 100%; border-radius: 32px; margin-top: 10px; background: #000; }
        .scanner-active { position: relative; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>🛒 Hamburg Türk Market</h1>
        <div class="sub">Barkod oku • Fiyatı anında gör • €uro</div>

        <div style="margin-bottom: 6px;"><strong>🔍 Barkod sorgula / okut</strong></div>
        <div class="flex-row">
            <input type="text" id="searchBarcode" placeholder="Barkod numarası" autocomplete="off">
            <button id="searchBtn">Sorgula</button>
        </div>
        
        <!-- Yeni: Video alanı buraya eklenecek -->
        <div id="camera-container" style="text-align: center;"></div>
        
        <button id="cameraBtn" class="camera-btn">📷 Kamera ile Barkod Oku (Yeni Sürüm)</button>
        
        <div id="resultArea"></div>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <strong>➕ Yeni ürün ekle (€)</strong>
            <button id="toggleFormBtn" class="btn-outline" style="width: auto; padding: 8px 16px;">Göster</button>
        </div>
        <div id="addForm" style="display: none; margin-top: 16px;">
            <label>Barkod *</label>
            <input type="text" id="newBarcode" placeholder="Örn: 4003998000470">
            <label>Ürün Adı *</label>
            <input type="text" id="newName" placeholder="Örn: Çaykur Rize Çayı">
            <label>Fiyat (€) *</label>
            <input type="number" step="0.01" id="newPrice" placeholder="Örn: 4.99">
            <button id="saveProductBtn">Kaydet</button>
        </div>
    </div>

    <div class="card">
        <strong>📋 Tüm ürünler</strong>
        <div id="productList" style="max-height: 380px; overflow-y: auto;"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.8.2/dist/quagga.min.js"></script>
<script>
    let products = [];
    let activeScanner = false;
    let currentStream = null;

    function loadProducts() {
        const stored = localStorage.getItem("market_hamburg_euro");
        if (stored) products = JSON.parse(stored);
        else {
            products = [
                { barcode: "4003998000470", name: "Çaykur Rize Turist Çayı 500g", price: 4.99 },
                { barcode: "8690504003016", name: "Ülker Çikolatalı Gofret", price: 1.29 },
                { barcode: "8690546020013", name: "Eti Burçak Bisküvi", price: 1.49 }
            ];
            saveProducts();
        }
        renderProductList();
    }

    function saveProducts() { localStorage.setItem("market_hamburg_euro", JSON.stringify(products)); }

    function renderProductList() {
        const container = document.getElementById("productList");
        if(products.length === 0) { container.innerHTML = "<p>Henüz ürün yok.</p>"; return; }
        let html = "<table><thead><tr><th>Ürün</th><th>Fiyat (€)</th><th>İşlem</th></tr></thead><tbody>";
        products.forEach((p, idx) => {
            html += `<tr>
                        <td><strong>${escapeHtml(p.name)}</strong><br><span style="font-size:0.7rem;">${p.barcode}</span></td>
                        <td>${p.price.toFixed(2)} €</td>
                        <td>
                            <button class="edit-btn" data-index="${idx}">✏️</button>
                            <button class="delete-btn" data-index="${idx}">🗑️</button>
                        </td>
                     </tr>`;
        });
        html += "</tbody></table>";
        container.innerHTML = html;
        attachListEvents();
    }

    function attachListEvents() {
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.onclick = () => { if(confirm("Sil?")) { products.splice(btn.dataset.index, 1); saveProducts(); renderProductList(); showMessage("Silindi.", "success"); } };
        });
        document.querySelectorAll('.edit-btn').forEach(btn => {
            btn.onclick = () => {
                let p = products[btn.dataset.index];
                let newPrice = prompt(`"${p.name}" için yeni fiyat (€):`, p.price);
                if(newPrice && !isNaN(parseFloat(newPrice))) { p.price = parseFloat(newPrice); saveProducts(); renderProductList(); showMessage("Güncellendi.", "success"); }
                else if(newPrice) showMessage("Hatalı fiyat!", "error");
            };
        });
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    function showResult(product) { document.getElementById("resultArea").innerHTML = `<div class="price-box"><div class="product-name">${escapeHtml(product.name)}</div><div class="price">${product.price.toFixed(2)} €</div><div class="barcode-display">Barkod: ${product.barcode}</div></div>`; }
    function showResultMessage(msg, type) { document.getElementById("resultArea").innerHTML = `<div class="${type}">${escapeHtml(msg)}</div>`; }
    function showMessage(msg, type) { const area = document.getElementById("resultArea"); const msgDiv = document.createElement("div"); msgDiv.className = type; msgDiv.innerText = msg; area.prepend(msgDiv); setTimeout(() => msgDiv.remove(), 3000); }

    // KAMERA ÇÖZÜMÜ (Quagga2 + Fallback)
    function stopScanner() {
        if(activeScanner) {
            if(window.Quagga) Quagga.stop();
            if(currentStream) currentStream.getTracks().forEach(track => track.stop());
            activeScanner = false;
        }
        document.getElementById("camera-container").innerHTML = '';
    }

    function startQuagga() {
        stopScanner();
        document.getElementById("camera-container").innerHTML = '<video id="video-preview" style="width:100%; max-width:100%; border-radius:16px; background:#000;"></video>';
        
        Quagga.init({
            inputStream: {
                type: "LiveStream",
                target: document.querySelector("#camera-container"),
                constraints: {
                    facingMode: "environment",
                    width: { min: 640, ideal: 1280, max: 1920 },
                    height: { min: 480, ideal: 720, max: 1080 }
                },
                area: { top: "30%", right: "10%", left: "10%", bottom: "30%" }
            },
            locator: {
                patchSize: "medium",
                halfSample: true
            },
            decoder: {
                readers: ["ean_reader", "ean_8_reader", "code_128_reader", "code_39_reader", "upc_reader", "upc_e_reader"]
            },
            locate: true
        }, function(err) {
            if (err) {
                console.error(err);
                showMessage("Kamera başlatılamadı. Lütfen manuel giriş yapın.", "error");
                document.getElementById("camera-container").innerHTML = '<p style="color:red;">Kamera açılamadı. Lütfen tarayıcı izinlerini kontrol edin veya manuel barkod girişi yapın.</p>';
                return;
            }
            Quagga.start();
            activeScanner = true;
        });

        Quagga.onDetected(function(result) {
            let code = result.codeResult.code;
            if(code) {
                stopScanner();
                document.getElementById("searchBarcode").value = code;
                searchProductByBarcode(code);
            }
        });
    }

    function searchProductByBarcode(barcode) {
        if(!barcode) return;
        const product = products.find(p => p.barcode === barcode.trim());
        if(product) showResult(product);
        else showResultMessage(`"${barcode}" bulunamadı. Ürünü ekleyin.`, "error");
    }

    document.getElementById("searchBtn").onclick = () => searchProductByBarcode(document.getElementById("searchBarcode").value);
    document.getElementById("searchBarcode").onkeypress = (e) => { if(e.key === "Enter") searchProductByBarcode(e.target.value); };
    document.getElementById("cameraBtn").onclick = () => startQuagga();
    document.getElementById("saveProductBtn").onclick = () => {
        const barcode = document.getElementById("newBarcode").value.trim();
        const name = document.getElementById("newName").value.trim();
        const price = parseFloat(document.getElementById("newPrice").value);
        if(!barcode || !name || isNaN(price)) { showMessage("Eksik bilgi!", "error"); return; }
        if(products.some(p => p.barcode === barcode)) { showMessage("Barkod zaten var! Düzenlemek için kalemi kullan.", "error"); return; }
        products.push({ barcode, name, price });
        saveProducts();
        renderProductList();
        document.getElementById("newBarcode").value = ""; document.getElementById("newName").value = ""; document.getElementById("newPrice").value = "";
        showMessage(`${name} eklendi.`, "success");
    };

    const toggleBtn = document.getElementById("toggleFormBtn"), addForm = document.getElementById("addForm");
    toggleBtn.onclick = () => { if(addForm.style.display === "none") { addForm.style.display = "block"; toggleBtn.innerText = "Gizle"; } else { addForm.style.display = "none"; toggleBtn.innerText = "Göster"; } };
    
    loadProducts();
</script>
</body>
</html>

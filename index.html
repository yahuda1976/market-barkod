<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Market Pro + SKT Takibi</title>
    <style>
        :root { --bg: #f0ede8; --card: #ffffff; --text: #1e4a2f; --primary: #1e6b3b; --accent: #c0392b; }
        .dark-mode { --bg: #1a1a1a; --card: #2d2d2d; --text: #e0e0e0; --primary: #2ecc71; --accent: #e74c3c; }
        
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; transition: 0.3s; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 16px; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 24px; padding: 18px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        h1 { font-size: 1.4rem; text-align: center; margin: 0; }
        .btn { padding: 12px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; width: 100%; margin-top: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-camera { background: #e67e22; color: white; }
        .btn-dark { background: #34495e; color: white; }
        
        input, select { width: 100%; padding: 12px; border-radius: 15px; border: 1px solid #ddd; margin-top: 8px; background: var(--card); color: var(--text); }
        
        .skt-warning { background: #fff5f5; border: 2px solid #ff4d4d; color: #c0392b; padding: 10px; border-radius: 15px; margin-bottom: 10px; animation: blink 2s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.7;} 100% {opacity: 1;} }
        
        .price-tag { font-size: 1.8rem; font-weight: bold; color: var(--accent); }
        .old-price { font-size: 0.9rem; text-decoration: line-through; color: #888; margin-right: 5px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td { padding: 10px 5px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        .search-box { position: sticky; top: 0; z-index: 100; background: var(--bg); padding-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="search-box">
        <div class="card" style="padding: 10px;">
            <input type="text" id="globalSearch" placeholder="🔍 Ürün adı veya barkod ile ara..." oninput="renderList()">
            <div style="display: flex; gap: 5px; margin-top: 5px;">
                <button onclick="toggleDarkMode()" class="btn btn-dark" style="flex:1">🌙 Gece Modu</button>
                <button onclick="exportData()" class="btn btn-dark" style="flex:1">💾 Yedekle</button>
            </div>
        </div>
    </div>

    <div id="sktAlertArea"></div>

    <div class="card">
        <h1>🛒 Hamburg Market Pro</h1>
        <div style="display:flex; gap:10px;">
            <button onclick="startScanner('search')" class="btn btn-camera">📷 Fiyat Sor</button>
            <button onclick="startScanner('add')" class="btn btn-camera">➕ Barkodla Ekle</button>
        </div>
        <div id="cameraPanel" style="display:none; margin-top:10px;">
            <video id="video" style="width:100%; border-radius:20px;"></video>
            <button onclick="stopScanner()" class="btn btn-primary" style="background:#c0392b">✖ Kapat</button>
        </div>
        <div id="resultArea"></div>
    </div>

    <div class="card">
        <strong>🆕 Yeni Ürün / Düzenle</strong>
        <input type="text" id="mBarcode" placeholder="Barkod">
        <input type="text" id="mName" placeholder="Ürün Adı">
        <div style="display:flex; gap:5px;">
            <input type="number" step="0.01" id="mPrice" placeholder="Fiyat €" style="flex:2">
            <input type="number" id="mQty" placeholder="Adet" value="1" style="flex:1">
        </div>
        <label style="font-size: 0.8rem; margin-top: 10px; display: block;">📅 Son Kullanma Tarihi (SKT):</label>
        <input type="date" id="mSkt">
        <button onclick="saveProduct()" class="btn btn-primary">💾 Ürünü Kaydet</button>
    </div>

    <div class="card">
        <strong>📋 Ürün Listesi</strong>
        <div id="productList"></div>
    </div>
</div>

<script src="https://unpkg.com/@ericblade/quagga2@1.8.2/dist/quagga.min.js"></script>
<script>
    let products = JSON.parse(localStorage.getItem("market_pro_v2")) || [];

    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }

    function playBeep() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "square";
        osc.frequency.setValueAtTime(1000, ctx.currentTime);
        gain.gain.setValueAtTime(0.5, ctx.currentTime);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.15);
    }

    function saveProduct() {
        const barcode = document.getElementById("mBarcode").value;
        const name = document.getElementById("mName").value;
        const price = parseFloat(document.getElementById("mPrice").value);
        const qty = parseInt(document.getElementById("mQty").value);
        const skt = document.getElementById("mSkt").value;

        if(!barcode || !name || isNaN(price)) return alert("Eksik bilgi!");

        const existingIdx = products.findIndex(p => p.barcode === barcode);
        const now = new Date().toLocaleDateString('tr-TR');

        const newProd = {
            barcode, name, qty, skt,
            price: price,
            oldPrice: (existingIdx > -1 && products[existingIdx].price !== price) ? products[existingIdx].price : null,
            addedDate: now
        };

        if(existingIdx > -1) products[existingIdx] = newProd;
        else products.push(newProd);

        localStorage.setItem("market_pro_v2", JSON.stringify(products));
        renderList();
        clearForm();
        playBeep();
    }

    function renderList() {
        const query = document.getElementById("globalSearch").value.toLowerCase();
        const listDiv = document.getElementById("productList");
        const alertDiv = document.getElementById("sktAlertArea");
        alertDiv.innerHTML = "";
        
        let html = `<table>`;
        let alerts = "";

        const sortedProds = [...products].sort((a,b) => new Date(a.skt) - new Date(b.skt));

        sortedProds.forEach((p, idx) => {
            if(!p.name.toLowerCase().includes(query) && !p.barcode.includes(query)) return;

            // SKT Hesaplama
            let sktStyle = "";
            if(p.skt) {
                const diff = (new Date(p.skt) - new Date()) / (1000 * 60 * 60 * 24);
                if(diff <= 5 && diff >= 0) {
                    sktStyle = "color:red; font-weight:bold;";
                    alerts += `<div class="skt-warning">⚠️ <b>${p.name}</b> SKT yaklaşıyor! (Son: ${p.skt})</div>`;
                }
            }

            html += `<tr>
                <td><b>${p.name}</b><br><small>${p.barcode} | Adet: ${p.qty}</small></td>
                <td style="text-align:right">
                    ${p.oldPrice ? `<span class="old-price">${p.oldPrice}€</span>` : ''}
                    <span style="color:var(--accent); font-weight:bold;">${p.price.toFixed(2)}€</span><br>
                    <small style="${sktStyle}">SKT: ${p.skt || 'Yok'}</small>
                </td>
                <td style="width:40px; text-align:right">
                    <button onclick="editProd('${p.barcode}')" style="background:none; border:none;">✏️</button>
                </td>
            </tr>`;
        });
        
        listDiv.innerHTML = html + `</table>`;
        alertDiv.innerHTML = alerts;
    }

    function editProd(bc) {
        const p = products.find(x => x.barcode === bc);
        document.getElementById("mBarcode").value = p.barcode;
        document.getElementById("mName").value = p.name;
        document.getElementById("mPrice").value = p.price;
        document.getElementById("mQty").value = p.qty;
        document.getElementById("mSkt").value = p.skt;
        window.scrollTo(0,0);
    }

    function startScanner(mode) {
        document.getElementById("cameraPanel").style.display = "block";
        Quagga.init({
            inputStream: { type: "LiveStream", target: document.querySelector("#video"), constraints: { facingMode: "environment" } },
            decoder: { readers: ["ean_reader", "code_128_reader"] }
        }, (err) => { if(!err) Quagga.start(); });

        Quagga.onDetected((data) => {
            const code = data.codeResult.code;
            playBeep();
            stopScanner();
            if(mode === 'search') {
                const p = products.find(x => x.barcode === code);
                if(p) {
                    document.getElementById("resultArea").innerHTML = `
                        <div style="text-align:center; padding:15px; background:#eaf5ea; border-radius:20px;">
                            <h3>${p.name}</h3>
                            <div class="price-tag">${p.price.toFixed(2)} €</div>
                            <p>Stok: ${p.qty} | SKT: ${p.skt}</p>
                        </div>`;
                } else {
                    alert("Ürün bulunamadı, ekleme ekranına aktarılıyor.");
                    document.getElementById("mBarcode").value = code;
                }
            } else {
                document.getElementById("mBarcode").value = code;
            }
        });
    }

    function stopScanner() { Quagga.stop(); document.getElementById("cameraPanel").style.display = "none"; }
    function clearForm() { ["mBarcode","mName","mPrice","mSkt"].forEach(id => document.getElementById(id).value = ""); document.getElementById("mQty").value=1; }
    
    function exportData() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(products));
        const dlAnchorElem = document.createElement('a');
        dlAnchorElem.setAttribute("href", dataStr);
        dlAnchorElem.setAttribute("download", "market_yedek.json");
        dlAnchorElem.click();
    }

    renderList();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MARKET PRO ULTRA</title>
    <script src="https://unpkg.com/@ericblade/quagga2@1.8.2/dist/quagga.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif; }
        body { background-color: #1a1a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .app-container { max-width: 450px; width: 100%; background-color: #1a1a1a; border-radius: 48px; padding: 24px 20px; }
        
        .result-area { background: #2a2a2a; border-radius: 32px; padding: 20px 16px; text-align: center; margin-bottom: 20px; border: 2px solid #333; }
        .result-placeholder { color: #888; font-size: 0.9rem; font-weight: 600; text-transform: uppercase; }
        .result-price { font-size: 2.5rem; font-weight: 900; color: #ff4444; margin: 8px 0; }
        .result-name { font-size: 1.2rem; font-weight: 800; color: #ffaa88; text-transform: uppercase; }
        .product-image { max-width: 100%; max-height: 140px; border-radius: 20px; margin: 8px auto; display: block; object-fit: contain; background: #3a3a3a; }
        
        /* Dashboard Stilleri */
        .dashboard-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: #2a2a2a; padding: 12px; border-radius: 20px; text-align: center; border: 1px solid #3a3a3a; }
        .stat-val { color: #44ff44; font-weight: 900; font-size: 1.1rem; }
        .stat-label { color: #aaa; font-size: 0.65rem; text-transform: uppercase; }

        .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
        .btn { background: #d4c9b8; border: none; border-radius: 28px; padding: 20px 12px; font-size: 1rem; font-weight: 900; letter-spacing: 1px; color: #c0392b; text-transform: uppercase; cursor: pointer; transition: 0.15s; box-shadow: 0 5px 0 #8f7a5c; text-align: center; aspect-ratio: 4 / 3; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #8f7a5c; }
        
        /* SKT Renkleri */
        .skt-critical { background: #ff4444 !important; color: white !important; } /* 0-7 gün */
        .skt-warning { background: #ffbb33 !important; color: black !important; }  /* 8-21 gün */
        .skt-safe { background: #00c851 !important; color: white !important; }     /* 22+ gün */

        .search-box input { width: 100%; padding: 14px 18px; border-radius: 60px; border: none; background: #2a2a2a; color: white; font-size: 1rem; text-align: center; margin-bottom: 10px;}
        
        /* Etiket Tasarımı (Gizli Render Alanı) */
        #label-template { position: absolute; left: -9999px; background: white; color: black; width: 300px; padding: 20px; text-align: center; border: 2px solid black; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #2a2a2a; width: 95%; max-width: 450px; border-radius: 32px; padding: 20px; max-height: 90%; overflow-y: auto; }
        
        .product-item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #444; margin-bottom: 5px; border-radius: 15px; }
        
        input, select, button { border-radius: 20px; padding: 10px; margin: 5px 0; }
        .hidden { display: none; }
        video { width: 100%; border-radius: 20px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="dashboard-stats">
        <div class="stat-card">
            <div class="stat-label">Toplam Değer</div>
            <div class="stat-val" id="totalValue">0.00 €</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Potansiyel Kâr</div>
            <div class="stat-val" id="potentialProfit">0.00 €</div>
        </div>
    </div>

    <div class="result-area" id="resultArea">
        <div class="result-placeholder">🎯 BARKOD OKUTUN VEYA ARAYIN</div>
    </div>

    <div class="search-box">
        <input type="text" id="manualSearchInput" placeholder="🔍 Ürün adı veya barkod...">
    </div>

    <div class="button-grid">
        <button class="btn" onclick="openCamera('search')">📷 SORGULA</button>
        <button class="btn" onclick="openCamera('add')">➕ ÜRÜN EKLE</button>
        <button class="btn" onclick="openInventoryModal()">📋 ENVANTER</button>
        <button class="btn" onclick="openSktFullModal()">📅 SKT LİSTESİ</button>
    </div>

    <div id="cameraContainer" class="hidden" style="background:#2a2a2a; padding:15px; border-radius:32px; margin-bottom:20px;">
        <video id="video" autoplay muted playsinline></video>
        <button onclick="closeCamera()" style="width:100%; background:#c0392b; color:white; border:none; padding:12px; margin-top:10px; font-weight:bold;">✖ KAPAT</button>
    </div>

    <div id="addFormContainer" class="hidden"></div>
</div>

<div id="sktFullModal" class="modal">
    <div class="modal-content">
        <h2 style="color:white; margin-bottom:15px;">📅 SKT DURUM LİSTESİ</h2>
        <div id="sktFullList"></div>
        <button onclick="closeModal('sktFullModal')" style="width:100%; margin-top:15px;">KAPAT</button>
    </div>
</div>

<div id="inventoryModal" class="modal">
    <div class="modal-content">
        <h2 style="color:white; margin-bottom:15px;">📦 TÜM ÜRÜNLER</h2>
        <div id="inventoryList"></div>
        <button onclick="closeModal('inventoryModal')" style="width:100%; margin-top:15px;">KAPAT</button>
    </div>
</div>

<div id="label-template">
    <h1 id="lbl-name" style="font-size: 24px; margin: 10px 0;">URUN ADI</h1>
    <div id="lbl-price" style="font-size: 48px; font-weight: 900;">0.00 €</div>
    <p id="lbl-barcode" style="margin-top: 10px; font-family: monospace;">00000000</p>
    <p style="font-size: 10px; margin-top: 5px;">MARKET PRO ULTRA</p>
</div>

<script>
    let products = [];
    let currentStream = null;

    // ---------- VERİ VE DASHBOARD ----------
    function loadData() {
        const stored = localStorage.getItem("market_pro_ultra_v1");
        products = stored ? JSON.parse(stored) : [];
        updateDashboard();
    }

    function saveData() {
        localStorage.setItem("market_pro_ultra_v1", JSON.stringify(products));
        updateDashboard();
    }

    function updateDashboard() {
        let totalValue = 0;
        let totalProfit = 0;

        products.forEach(p => {
            const price = parseFloat(p.price || 0);
            const cost = parseFloat(p.cost || 0);
            const qty = parseInt(p.quantity || 0);
            
            totalValue += price * qty;
            totalProfit += (price - cost) * qty;
        });

        document.getElementById("totalValue").innerText = totalValue.toFixed(2) + " €";
        document.getElementById("potentialProfit").innerText = totalProfit.toFixed(2) + " €";
    }

    // ---------- SESLİ OKUMA (TTS) ----------
    function speakProduct(name, price) {
        const text = `${name}, ${price.toFixed(2)} Euro.`;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'tr-TR';
        utterance.rate = 1.0;
        window.speechSynthesis.speak(utterance);
    }

    // ---------- ETİKET OLUŞTURUCU ----------
    async function downloadLabel(name, price, barcode) {
        document.getElementById("lbl-name").innerText = name;
        document.getElementById("lbl-price").innerText = price.toFixed(2) + " €";
        document.getElementById("lbl-barcode").innerText = barcode;

        const target = document.getElementById("label-template");
        const canvas = await html2canvas(target);
        const imgData = canvas.toDataURL("image/png");
        
        const link = document.createElement('a');
        link.download = `etiket-${name}.png`;
        link.href = imgData;
        link.click();
    }

    // ---------- SKT HESAPLAMA VE RENKLENDİRME ----------
    function getSktClass(expiryDate) {
        if (!expiryDate) return "";
        const today = new Date();
        today.setHours(0,0,0,0);
        const exp = new Date(expiryDate);
        const diffDays = Math.ceil((exp - today) / (1000 * 60 * 60 * 24));

        if (diffDays <= 7) return "skt-critical"; // Kırmızı
        if (diffDays <= 21) return "skt-warning"; // Sarı (8-21 gün)
        return "skt-safe"; // Yeşil (22+ gün)
    }

    // ---------- MODALLAR ----------
    function openSktFullModal() {
        const list = document.getElementById("sktFullList");
        list.innerHTML = "";
        
        // Tarihi olanları sırala
        const datedProducts = products.filter(p => p.expiry).sort((a,b) => new Date(a.expiry) - new Date(b.expiry));
        
        datedProducts.forEach(p => {
            const sktClass = getSktClass(p.expiry);
            list.innerHTML += `
                <div class="product-item-row ${sktClass}">
                    <span><strong>${p.name}</strong><br><small>${p.expiry}</small></span>
                    <span>${p.quantity} Adet</span>
                </div>`;
        });
        document.getElementById("sktFullModal").style.display = "flex";
    }

    function openInventoryModal() {
        const list = document.getElementById("inventoryList");
        list.innerHTML = "";
        products.forEach((p, idx) => {
            list.innerHTML += `
                <div class="product-item-row" style="background:#3a3a3a; color:white;">
                    <span>${p.name}<br><small>${p.price.toFixed(2)} €</small></span>
                    <button onclick="downloadLabel('${p.name}', ${p.price}, '${p.barcode}')">🖨️ Etiket</button>
                </div>`;
        });
        document.getElementById("inventoryModal").style.display = "flex";
    }

    function closeModal(id) { document.getElementById(id).style.display = "none"; }

    // ---------- KAMERA VE ARAMA (Mevcut mantığın güncellenmiş hali) ----------
    function showResult(product) {
        const resultDiv = document.getElementById("resultArea");
        resultDiv.innerHTML = `
            <div class="result-name">${product.name}</div>
            <div class="result-price">${product.price.toFixed(2)} €</div>
            <div style="color:#aaa;">STOK: ${product.quantity} | SKT: ${product.expiry || 'YOK'}</div>
            <button onclick="downloadLabel('${product.name}', ${product.price}, '${product.barcode}')" style="margin-top:10px; background:#444; color:white; border:none; padding:8px; border-radius:10px;">🖨️ ETİKET İNDİR</button>
        `;
        speakProduct(product.name, product.price);
    }

    async function openCamera(mode) {
        const container = document.getElementById("cameraContainer");
        container.classList.remove("hidden");
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            document.getElementById("video").srcObject = stream;
            currentStream = stream;

            Quagga.init({
                inputStream: { type: "LiveStream", target: document.getElementById("video") },
                decoder: { readers: ["ean_reader", "upc_reader", "code_128_reader"] }
            }, (err) => {
                if(!err) Quagga.start();
            });

            Quagga.onDetected((data) => {
                const code = data.codeResult.code;
                closeCamera();
                const found = products.find(p => p.barcode === code);
                if (found) showResult(found);
                else if (mode === 'add') showAddForm(code);
                else alert("Ürün bulunamadı: " + code);
            });

        } catch (e) { alert("Kamera hatası!"); }
    }

    function closeCamera() {
        if(Quagga) Quagga.stop();
        if(currentStream) currentStream.getTracks().forEach(t => t.stop());
        document.getElementById("cameraContainer").classList.add("hidden");
    }

    function showAddForm(barcode) {
        const container = document.getElementById("addFormContainer");
        container.classList.remove("hidden");
        container.innerHTML = `
            <div style="background:#2a2a2a; padding:20px; border-radius:24px; color:white;">
                <h3>YENİ ÜRÜN</h3>
                <input type="text" id="newName" placeholder="Ürün Adı" style="width:100%">
                <input type="number" id="newPrice" placeholder="Satış Fiyatı" style="width:100%">
                <input type="number" id="newCost" placeholder="Maliyet" style="width:100%">
                <input type="number" id="newQty" placeholder="Stok Adedi" value="1" style="width:100%">
                <input type="date" id="newExpiry" style="width:100%">
                <button onclick="saveNewProduct('${barcode}')" style="width:100%; background:green; color:white;">KAYDET</button>
            </div>
        `;
    }

    function saveNewProduct(barcode) {
        const name = document.getElementById("newName").value.toUpperCase();
        const price = parseFloat(document.getElementById("newPrice").value);
        const cost = parseFloat(document.getElementById("newCost").value || 0);
        const quantity = parseInt(document.getElementById("newQty").value);
        const expiry = document.getElementById("newExpiry").value;

        if(!name || isNaN(price)) return alert("Eksik bilgi!");

        products.push({ barcode, name, price, cost, quantity, expiry });
        saveData();
        document.getElementById("addFormContainer").classList.add("hidden");
        alert("Ürün başarıyla eklendi!");
    }

    // Manuel Arama
    document.getElementById("manualSearchInput").addEventListener("change", function(e) {
        const val = e.target.value;
        const found = products.find(p => p.barcode === val || p.name.includes(val.toUpperCase()));
        if(found) showResult(found);
    });

    loadData();
</script>
</body>
</html>

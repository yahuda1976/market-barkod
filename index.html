<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Türk Market (Hamburg) - Barkodlu Fiyat Sistemi €</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: #f5f2eb;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 650px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 36px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.05);
            transition: 0.2s;
        }
        h1 {
            font-size: 1.9rem;
            margin: 0 0 6px 0;
            color: #1e4a2f;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sub {
            color: #b45f2b;
            margin-bottom: 24px;
            border-left: 4px solid #e67e22;
            padding-left: 14px;
            font-weight: 500;
        }
        label {
            font-weight: 600;
            display: block;
            margin-top: 14px;
            margin-bottom: 6px;
            color: #3e2a21;
        }
        input, button {
            width: 100%;
            padding: 14px 18px;
            border-radius: 60px;
            border: 1px solid #ddd;
            font-size: 1rem;
            transition: 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #e67e22;
            box-shadow: 0 0 0 2px rgba(230,126,34,0.2);
        }
        button {
            background: #1e6b3b;
            color: white;
            font-weight: bold;
            border: none;
            margin-top: 16px;
            cursor: pointer;
        }
        button:hover {
            background: #14532d;
        }
        .btn-outline {
            background: #f0ede8;
            color: #1e6b3b;
            border: 1px solid #ccc;
            margin-top: 8px;
        }
        .btn-warning {
            background: #e67e22;
        }
        .btn-warning:hover {
            background: #b45f2b;
        }
        .price-box {
            background: #eaf5ea;
            border-radius: 32px;
            padding: 20px;
            text-align: center;
            margin: 20px 0;
        }
        .price {
            font-size: 3rem;
            font-weight: 800;
            color: #c0392b;
            margin: 8px 0;
            letter-spacing: -0.5px;
        }
        .product-name {
            font-size: 1.5rem;
            font-weight: 700;
        }
        .barcode-display {
            font-family: monospace;
            background: #fff0df;
            padding: 8px;
            border-radius: 30px;
            font-size: 0.85rem;
        }
        .error {
            color: #c0392b;
            background: #ffe6e6;
            padding: 12px;
            border-radius: 28px;
            margin-top: 12px;
        }
        .success {
            color: #1e6b3b;
            background: #e0f2e0;
            padding: 12px;
            border-radius: 28px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }
        th, td {
            text-align: left;
            padding: 12px 4px;
            border-bottom: 1px solid #eee;
            vertical-align: middle;
        }
        .product-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .edit-btn, .delete-btn {
            background: none;
            border: none;
            font-size: 1.25rem;
            cursor: pointer;
            padding: 6px 10px;
            margin: 0;
            width: auto;
            border-radius: 40px;
        }
        .edit-btn {
            color: #e67e22;
        }
        .delete-btn {
            color: #a00;
        }
        .camera-btn {
            background: #e67e22;
            margin-top: 8px;
        }
        .flex-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .flex-row input {
            flex: 1;
            margin: 0;
        }
        .flex-row button {
            flex: 0 0 auto;
            width: auto;
            padding: 14px 22px;
            margin-top: 0;
        }
        @media (max-width: 500px) {
            .flex-row {
                flex-direction: column;
            }
            .flex-row button {
                width: 100%;
            }
            .product-actions {
                flex-direction: column;
                gap: 4px;
            }
        }
        .small-text {
            font-size: 0.75rem;
            color: #777;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>🛒 Hamburg Türk Market</h1>
        <div class="sub">Barkod oku • Fiyatı anında gör • €uro</div>

        <!-- Sorgulama alanı -->
        <div style="margin-bottom: 6px;"><strong>🔍 Barkod sorgula / okut</strong></div>
        <div class="flex-row">
            <input type="text" id="searchBarcode" placeholder="Barkod numarası veya kamera ile okut" autocomplete="off">
            <button id="searchBtn">Sorgula</button>
        </div>
        <button id="cameraBtn" class="camera-btn">📷 Kamera ile Barkod Oku</button>
        
        <div id="resultArea">
            <!-- dinamik sonuç -->
        </div>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <strong>➕ Yeni ürün ekle (€)</strong>
            <button id="toggleFormBtn" class="btn-outline" style="width: auto; padding: 8px 16px;">Göster</button>
        </div>
        <div id="addForm" style="display: none; margin-top: 16px;">
            <label>Barkod *</label>
            <input type="text" id="newBarcode" placeholder="Örn: 4003998000470">
            <label>Ürün Adı *</label>
            <input type="text" id="newName" placeholder="Örn: Çaykur Rize Çayı">
            <label>Fiyat (€) *</label>
            <input type="number" step="0.01" id="newPrice" placeholder="Örn: 4.99">
            <button id="saveProductBtn">Kaydet</button>
        </div>
    </div>

    <div class="card">
        <strong>📋 Tüm ürünler (fiyat güncelleme için kaleme tıkla)</strong>
        <div id="productList" style="max-height: 380px; overflow-y: auto;">
            <!-- liste buraya gelecek -->
        </div>
    </div>
</div>

<script>
    // Veri modeli: products = [{ barcode, name, price }]
    let products = [];

    // Yükleme & kaydetme
    function loadProducts() {
        const stored = localStorage.getItem("market_hamburg_euro");
        if (stored) {
            products = JSON.parse(stored);
        } else {
            // Örnek ürünler (Almanya'da yaygın)
            products = [
                { barcode: "4003998000470", name: "Çaykur Rize Turist Çayı 500g", price: 4.99 },
                { barcode: "8690504003016", name: "Ülker Çikolatalı Gofret", price: 1.29 },
                { barcode: "8690546020013", name: "Eti Burçak Bisküvi", price: 1.49 },
                { barcode: "8690644050147", name: "Doğadan Yeşil Çay 20'li", price: 2.79 },
                { barcode: "8690546121017", name: "Salat Biber Salçası 830g", price: 3.49 }
            ];
            saveProducts();
        }
        renderProductList();
    }

    function saveProducts() {
        localStorage.setItem("market_hamburg_euro", JSON.stringify(products));
    }

    // Ürün listesini tablo olarak göster (fiyat güncelleme butonu eklendi)
    function renderProductList() {
        const container = document.getElementById("productList");
        if (!container) return;
        if (products.length === 0) {
            container.innerHTML = "<p style='text-align:center;color:#aaa'>Henüz ürün yok. Yukarıdan ekleyin.</p>";
            return;
        }
        let html = `<tr><thead><tr><th>Ürün</th><th>Fiyat (€)</th><th>Barkod</th><th>İşlem</th></tr></thead><tbody>`;
        products.forEach((p, idx) => {
            html += `<tr>
                        <td><strong>${escapeHtml(p.name)}</strong></td>
                        <td>${p.price.toFixed(2)} €</td>
                        <td style="font-size:0.75rem;">${escapeHtml(p.barcode)}</td>
                        <td class="product-actions">
                            <button class="edit-btn" data-index="${idx}" title="Fiyat güncelle">✏️</button>
                            <button class="delete-btn" data-index="${idx}" title="Sil">🗑️</button>
                        </td>
                      </tr>`;
        });
        html += `</tbody></table>`;
        container.innerHTML = html;

        // Silme butonları
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.getAttribute('data-index'));
                if (confirm("Bu ürünü silmek istediğinize emin misiniz?")) {
                    products.splice(idx, 1);
                    saveProducts();
                    renderProductList();
                    showMessage("Ürün silindi.", "success");
                }
            });
        });

        // Fiyat GÜNCELLEME butonları
        document.querySelectorAll('.edit-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.getAttribute('data-index'));
                const product = products[idx];
                const newPrice = prompt(`"${product.name}" için yeni fiyatı girin (€):`, product.price.toFixed(2));
                if (newPrice !== null) {
                    const parsedPrice = parseFloat(newPrice.replace(',', '.'));
                    if (!isNaN(parsedPrice) && parsedPrice >= 0) {
                        product.price = parsedPrice;
                        saveProducts();
                        renderProductList();
                        showMessage(`${product.name} fiyatı ${parsedPrice.toFixed(2)} € olarak güncellendi.`, "success");
                        // Eğer son sorgulama alanında bu ürün varsa orayı da güncellemek için opsiyonel
                        const currentSearchVal = document.getElementById("searchBarcode").value.trim();
                        if (currentSearchVal === product.barcode) {
                            showResult(product);
                        }
                    } else {
                        showMessage("Geçersiz fiyat! Lütfen sayı girin (örn: 2.99).", "error");
                    }
                }
            });
        });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Barkod ile arama ve sonuç gösterimi
    function searchProductByBarcode(barcode) {
        if (!barcode || barcode.trim() === "") {
            showResultMessage("Lütfen bir barkod girin veya okutun.", "error");
            return null;
        }
        const clean = barcode.trim();
        const product = products.find(p => p.barcode === clean);
        if (product) {
            showResult(product);
        } else {
            showResultMessage(`"${escapeHtml(clean)}" barkodlu ürün bulunamadı. Ürünü ekleyebilirsiniz.`, "error");
        }
        return product;
    }

    function showResult(product) {
        const area = document.getElementById("resultArea");
        area.innerHTML = `
            <div class="price-box">
                <div class="product-name">${escapeHtml(product.name)}</div>
                <div class="price">${product.price.toFixed(2)} €</div>
                <div class="barcode-display">Barkod: ${product.barcode}</div>
                <div class="small-text" style="margin-top: 10px;">✅ Fiyat güncellemek için ürün listesinden kaleme tıkla</div>
            </div>
        `;
    }

    function showResultMessage(msg, type) {
        const area = document.getElementById("resultArea");
        area.innerHTML = `<div class="${type}">${escapeHtml(msg)}</div>`;
    }

    function showMessage(msg, type) {
        const area = document.getElementById("resultArea");
        const msgDiv = document.createElement("div");
        msgDiv.className = type;
        msgDiv.innerText = msg;
        area.prepend(msgDiv);
        setTimeout(() => msgDiv.remove(), 3500);
    }

    // ----- KAMERA İLE BARKOD OKUMA (mobilde) -----
    function startCameraScanner() {
        if (!window.BarcodeDetector) {
            showMessage("⚠️ Tarayıcınız BarcodeDetector API'sini desteklemiyor. Lütfen barkodu manuel girin veya barkod okuyucu uygulama kullanın.", "error");
            document.getElementById("searchBarcode").focus();
            return;
        }
        const barcodeDetector = new BarcodeDetector({ formats: ["ean_13", "ean_8", "code_128", "code_39", "upc_a", "upc_e"] });
        const video = document.createElement("video");
        video.style.position = "fixed";
        video.style.top = "0";
        video.style.left = "0";
        video.style.width = "100%";
        video.style.height = "auto";
        video.style.zIndex = "1000";
        video.style.backgroundColor = "#000";
        video.setAttribute("autoplay", "");
        video.setAttribute("playsinline", "");
        document.body.appendChild(video);
        
        let stream = null;
        let scanning = true;
        
        const stopCamera = () => {
            if (stream) stream.getTracks().forEach(track => track.stop());
            if (video.parentNode) video.remove();
            scanning = false;
        };
        
        const closeBtn = document.createElement("button");
        closeBtn.innerText = "✖ Kapat";
        closeBtn.style.position = "fixed";
        closeBtn.style.bottom = "25px";
        closeBtn.style.left = "50%";
        closeBtn.style.transform = "translateX(-50%)";
        closeBtn.style.zIndex = "1001";
        closeBtn.style.padding = "12px 24px";
        closeBtn.style.background = "#e67e22";
        closeBtn.style.border = "none";
        closeBtn.style.borderRadius = "60px";
        closeBtn.style.color = "white";
        closeBtn.style.fontWeight = "bold";
        closeBtn.style.boxShadow = "0 2px 10px rgba(0,0,0,0.3)";
        document.body.appendChild(closeBtn);
        closeBtn.onclick = () => { stopCamera(); closeBtn.remove(); };
        
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(mediaStream => {
                stream = mediaStream;
                video.srcObject = mediaStream;
                video.play();
                const scanInterval = setInterval(async () => {
                    if (!scanning) {
                        clearInterval(scanInterval);
                        return;
                    }
                    try {
                        const barcodes = await barcodeDetector.detect(video);
                        if (barcodes.length > 0) {
                            const code = barcodes[0].rawValue;
                            stopCamera();
                            closeBtn.remove();
                            document.getElementById("searchBarcode").value = code;
                            searchProductByBarcode(code);
                        }
                    } catch(e) { console.warn(e); }
                }, 500);
                
                // temizlik için interval ve kamera durdurmayı birleştir
                const originalStop = stopCamera;
                window.customClean = () => {
                    clearInterval(scanInterval);
                    originalStop();
                    if (closeBtn.parentNode) closeBtn.remove();
                };
                window.customClean();
            })
            .catch(err => {
                showMessage("Kamera erişimi reddedildi veya hata: " + err.message, "error");
                video.remove();
                closeBtn.remove();
            });
    }

    // ----- EVENT LISTENER'lar -----
    document.getElementById("searchBtn").addEventListener("click", () => {
        const val = document.getElementById("searchBarcode").value;
        searchProductByBarcode(val);
    });
    document.getElementById("searchBarcode").addEventListener("keypress", (e) => {
        if (e.key === "Enter") searchProductByBarcode(e.target.value);
    });
    document.getElementById("cameraBtn").addEventListener("click", startCameraScanner);
    
    // Yeni ürün kaydet
    document.getElementById("saveProductBtn").addEventListener("click", () => {
        const barcode = document.getElementById("newBarcode").value.trim();
        const name = document.getElementById("newName").value.trim();
        const price = parseFloat(document.getElementById("newPrice").value);
        if (!barcode || !name || isNaN(price)) {
            showMessage("Lütfen barkod, ürün adı ve geçerli bir fiyat girin.", "error");
            return;
        }
        if (products.some(p => p.barcode === barcode)) {
            showMessage("Bu barkod zaten kayıtlı! Fiyat güncellemek için listedeki kalem butonunu kullan.", "error");
            return;
        }
        products.push({ barcode, name, price });
        saveProducts();
        renderProductList();
        document.getElementById("newBarcode").value = "";
        document.getElementById("newName").value = "";
        document.getElementById("newPrice").value = "";
        showMessage(`"${name}" başarıyla eklendi (${price.toFixed(2)} €).`, "success");
    });
    
    // Form göster/gizle
    const toggleBtn = document.getElementById("toggleFormBtn");
    const addForm = document.getElementById("addForm");
    toggleBtn.addEventListener("click", () => {
        if (addForm.style.display === "none") {
            addForm.style.display = "block";
            toggleBtn.innerText = "Gizle";
        } else {
            addForm.style.display = "none";
            toggleBtn.innerText = "Göster";
        }
    });
    
    // Enter ile hızlı ekleme yardımı
    const inputs = ["newBarcode", "newName", "newPrice"];
    inputs.forEach(id => {
        document.getElementById(id).addEventListener("keypress", (e) => {
            if (e.key === "Enter") document.getElementById("saveProductBtn").click();
        });
    });
    
    loadProducts();
</script>
</body>
</html>

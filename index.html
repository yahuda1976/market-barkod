<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MARKET PRO</title>
    <script src="https://unpkg.com/@ericblade/quagga2@1.8.2/dist/quagga.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif; }
        body { background-color: #1a1a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .app-container { max-width: 450px; width: 100%; background-color: #1a1a1a; border-radius: 48px; padding: 24px 20px; }
        
        .result-area { background: #2a2a2a; border-radius: 32px; padding: 20px 16px; text-align: center; margin-bottom: 20px; }
        .result-placeholder { color: #888; font-size: 0.9rem; font-weight: 600; text-transform: uppercase; }
        .result-price { font-size: 2.5rem; font-weight: 900; color: #ff4444; margin: 8px 0; }
        .result-name { font-size: 1.2rem; font-weight: 800; color: #ffaa88; text-transform: uppercase; }
        .product-image { max-width: 100%; max-height: 140px; border-radius: 20px; margin: 8px auto; display: block; object-fit: contain; background: #3a3a3a; }
        .edit-result-btn { background: #c0392b; border: none; border-radius: 40px; padding: 10px 20px; margin-top: 10px; color: white; font-weight: bold; cursor: pointer; display: inline-block; }
        
        .inline-edit-form, .edit-form, .add-product-form { display: flex; flex-direction: column; gap: 12px; margin-top: 12px; }
        input, select { width: 100%; padding: 14px; border-radius: 40px; border: none; background: #555; color: white; font-size: 1rem; }
        button { background: #2c6e2f; border: none; border-radius: 40px; padding: 14px; color: white; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .image-buttons { display: flex; gap: 12px; margin-top: 8px; }
        .image-buttons button { flex: 1; background: #c0392b; }
        
        .calc-group { background: #3a3a3a; border-radius: 32px; padding: 12px; margin: 8px 0; }
        .calc-row { margin-bottom: 10px; }
        .calc-row label { display: block; color: #ffaa88; font-size: 0.8rem; margin-bottom: 4px; text-transform: uppercase; }
        .calc-row input { margin: 0; }
        .calc-button { background: #c0392b; margin-top: 8px; }
        
        .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
        .btn { background: #d4c9b8; border: none; border-radius: 28px; padding: 20px 12px; font-size: 1rem; font-weight: 900; letter-spacing: 1px; color: #c0392b; text-transform: uppercase; cursor: pointer; transition: 0.15s; box-shadow: 0 5px 0 #8f7a5c; text-align: center; aspect-ratio: 4 / 3; display: flex; align-items: center; justify-content: center; }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #8f7a5c; }
        
        .search-box { margin-bottom: 20px; }
        .search-box input { width: 100%; padding: 14px 18px; border-radius: 60px; border: none; background: #2a2a2a; color: white; font-size: 1rem; text-align: center; }
        .search-results { background: #2a2a2a; border-radius: 28px; margin-top: 8px; max-height: 200px; overflow-y: auto; }
        .search-result-item { padding: 12px 16px; border-bottom: 1px solid #444; cursor: pointer; }
        .search-result-name { font-weight: bold; color: #ffaa88; text-transform: uppercase; }
        .search-result-price { color: #ff6666; font-size: 0.9rem; }
        
        .camera-container { display: none; margin: 15px 0; background: #2a2a2a; border-radius: 32px; padding: 12px; }
        .video-wrapper { background: #000; border-radius: 24px; overflow: hidden; }
        video { width: 100%; display: block; }
        .close-camera-btn { background: #444; color: white; border: none; border-radius: 40px; padding: 12px; margin-top: 10px; width: 100%; font-weight: bold; cursor: pointer; }
        
        .skt-button { background: #2a2a2a; border-radius: 28px; padding: 16px 20px; margin-top: 20px; text-align: center; cursor: pointer; border: 1px solid #3a3a3a; }
        .skt-title { font-size: 0.8rem; font-weight: 700; color: #ff8888; text-transform: uppercase; margin-bottom: 4px; }
        .skt-message { font-size: 1rem; font-weight: 800; color: #ff4444; text-transform: uppercase; }
        .skt-message.normal { color: #ffaa88; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #2a2a2a; width: 90%; max-width: 450px; border-radius: 48px; padding: 20px; max-height: 85%; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; position: sticky; top: 0; background: #2a2a2a; padding-bottom: 10px; }
        .modal-title { color: #ff6666; font-size: 1.3rem; font-weight: 800; text-transform: uppercase; }
        .close-modal-btn { background: #c0392b; border: none; border-radius: 40px; padding: 8px 16px; color: white; font-weight: bold; cursor: pointer; }
        .product-list-simple { display: flex; flex-direction: column; gap: 12px; }
        .product-name-item { background: #3a3a3a; border-radius: 40px; padding: 14px 20px; cursor: pointer; font-weight: bold; text-transform: uppercase; color: #ffaa88; text-align: center; }
        .product-detail-card { background: #3a3a3a; border-radius: 32px; padding: 16px; margin-top: 16px; text-align: center; }
        .detail-image { max-width: 100%; max-height: 150px; border-radius: 24px; margin: 10px auto; }
        .detail-actions { display: flex; gap: 10px; margin-top: 12px; justify-content: center; flex-wrap: wrap; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="result-area" id="resultArea">
        <div class="result-placeholder">🎯 BARKOD OKUTUNCA VEYA<br>MANUEL ARAMA YAPINCA<br>FİYAT GÖRÜNÜR</div>
    </div>

    <div class="search-box">
        <input type="text" id="manualSearchInput" placeholder="🔍 Ürün adı veya barkod ile ara..." autocomplete="off">
        <div id="searchResults" class="search-results" style="display: none;"></div>
    </div>

    <div class="button-grid">
        <button class="btn" id="searchBtn">📷 FİYAT SORGULA</button>
        <button class="btn" id="addBtn">➕ ÜRÜN EKLE</button>
        <button class="btn" id="inventoryBtn">📋 ENVANTER</button>
        <button class="btn" id="settingsBtn">⚙️ AYARLAR</button>
    </div>

    <div id="cameraContainer" class="camera-container">
        <div class="video-wrapper"><video id="video" autoplay muted playsinline></video></div>
        <button class="close-camera-btn" onclick="closeCamera()">✖ KAPAT</button>
        <div id="cameraStatus" style="color:#aaa; text-align:center; margin-top:8px;"></div>
    </div>

    <div id="addFormContainer" class="hidden"></div>

    <div class="skt-button" id="sktButton">
        <div class="skt-title">⚠️ SKT YAKIN ÜRÜNLER</div>
        <div class="skt-message" id="sktMessage">YÜKLENİYOR...</div>
    </div>
</div>

<!-- ENVANTER MODAL -->
<div id="inventoryModal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><span class="modal-title">📦 ENVANTER</span><button class="close-modal-btn" onclick="closeInventoryModal()">✖ KAPAT</button></div>
        <div id="modalProductList" class="product-list-simple"></div>
        <div id="productDetailArea" style="margin-top: 16px;"></div>
    </div>
</div>

<!-- SKT MODAL -->
<div id="sktModal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><span class="modal-title">⚠️ SKT YAKIN ÜRÜNLER</span><button class="close-modal-btn" onclick="closeSktModal()">✖ KAPAT</button></div>
        <div id="sktProductList"></div>
    </div>
</div>

<!-- AYARLAR MODAL -->
<div id="settingsModal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><span class="modal-title">⚙️ AYARLAR</span><button class="close-modal-btn" onclick="closeSettingsModal()">✖ KAPAT</button></div>
        <div style="display: flex; flex-direction: column; gap: 12px;"><button onclick="backupData()">💾 YEDEK AL</button><button onclick="restoreData()">📂 GERİ YÜKLE</button></div>
    </div>
</div>

<script>
    let products = [];
    let currentStream = null;
    let currentCameraMode = null;
    let lastScannedProduct = null;
    let isEditMode = false;

    // ---------- VERİ YÖNETİMİ ----------
    function loadData() {
        const stored = localStorage.getItem("market_pro_final_v12");
        if(stored) products = JSON.parse(stored);
        else {
            products = [
                { barcode: "4003998000470", name: "ÇAYKUR RİZE ÇAYI", price: 4.99, quantity: 12, expiry: "2025-08-15", priceHistory: [4.99], image: null },
                { barcode: "8690504003016", name: "ÜLKER ÇİKOLATA", price: 1.29, quantity: 30, expiry: "2025-06-20", priceHistory: [1.29], image: null },
                { barcode: "8690804349850", name: "SUNTAT HİMALAYA TUZU", price: 2.99, quantity: 8, expiry: "2025-04-25", priceHistory: [2.99], image: null }
            ];
            saveData();
        }
        updateSktButton();
    }
    function saveData() { localStorage.setItem("market_pro_final_v12", JSON.stringify(products)); }

    function updateSktButton() {
        const today = new Date(); today.setHours(0,0,0,0);
        const warnings = products.filter(p => { if(!p.expiry) return false; const diff = Math.ceil((new Date(p.expiry) - today) / 86400000); return diff >= 0 && diff <= 5; });
        const sktMsg = document.getElementById("sktMessage");
        if(warnings.length === 0) { sktMsg.innerHTML = "YAKIN ÜRÜN YOK"; sktMsg.className = "skt-message normal"; }
        else { sktMsg.innerHTML = `${warnings.length} ÜRÜN YAKIN`; sktMsg.className = "skt-message"; }
    }

    // HESAP MAKİNESİ
    function calculatePrice(cost, profitPercent, taxPercent) {
        let totalPercent = (profitPercent || 0) + (taxPercent || 0);
        let price = cost * (1 + totalPercent / 100);
        return Math.round(price * 100) / 100;
    }

    function calculateAndSetFor(target) {
        let cost, profit, tax, priceField;
        if (target === 'inline') {
            cost = parseFloat(document.getElementById("inlineCost")?.value);
            profit = parseFloat(document.getElementById("inlineProfit")?.value);
            tax = parseFloat(document.getElementById("inlineTax")?.value);
            priceField = document.getElementById("inlinePrice");
        } else if (target === 'edit') {
            cost = parseFloat(document.getElementById("editCost")?.value);
            profit = parseFloat(document.getElementById("editProfit")?.value);
            tax = parseFloat(document.getElementById("editTax")?.value);
            priceField = document.getElementById("editPrice");
        } else if (target === 'add') {
            cost = parseFloat(document.getElementById("addCost")?.value);
            profit = parseFloat(document.getElementById("addProfit")?.value);
            tax = parseFloat(document.getElementById("addTax")?.value);
            priceField = document.getElementById("addPrice");
        } else return;
        if (isNaN(cost) || isNaN(profit) || isNaN(tax)) { alert("Maliyet, kar ve vergi girin!"); return; }
        let newPrice = calculatePrice(cost, profit, tax);
        if (priceField) priceField.value = newPrice;
    }

    // ---------- SKT MODAL ----------
    function openSktModal() {
        const modal = document.getElementById("sktModal");
        const container = document.getElementById("sktProductList");
        const today = new Date(); today.setHours(0,0,0,0);
        const warnings = products.filter(p => { if(!p.expiry) return false; const diff = Math.ceil((new Date(p.expiry) - today) / 86400000); return diff >= 0 && diff <= 5; });
        if(warnings.length === 0) container.innerHTML = "<div style='color:#aaa; text-align:center;'>YAKLAŞAN SKT ÜRÜNÜ YOK</div>";
        else {
            let html = "";
            warnings.forEach(p => { const diff = Math.ceil((new Date(p.expiry) - today) / 86400000); html += `<div style="background:#3a3a3a; border-radius:28px; padding:12px; margin-bottom:10px;"><strong>${escapeHtml(p.name)}</strong><br>${p.barcode}<br>SKT: ${p.expiry} (${diff} GÜN)<br>FİYAT: ${p.price.toFixed(2)} € | STOK: ${p.quantity}</div>`; });
            container.innerHTML = html;
        }
        modal.style.display = "flex";
    }
    function closeSktModal() { document.getElementById("sktModal").style.display = "none"; }

    // ---------- ENVANTER MODAL ----------
    function openInventoryModal() {
        const modal = document.getElementById("inventoryModal");
        const container = document.getElementById("modalProductList");
        if(products.length === 0) container.innerHTML = "<div style='color:#aaa; text-align:center;'>ÜRÜN YOK</div>";
        else {
            let html = "";
            products.forEach((p, idx) => { html += `<div class="product-name-item" onclick="showProductDetail(${idx})">${escapeHtml(p.name)}</div>`; });
            container.innerHTML = html;
        }
        document.getElementById("productDetailArea").innerHTML = "";
        modal.style.display = "flex";
    }
    function closeInventoryModal() { document.getElementById("inventoryModal").style.display = "none"; }

    function showProductDetail(idx) {
        const p = products[idx];
        const detailArea = document.getElementById("productDetailArea");
        detailArea.innerHTML = `
            <div class="product-detail-card">
                ${p.image ? `<img src="${p.image}" class="detail-image" onerror="this.onerror=null; this.src=''; this.alt='Resim yüklenemedi';">` : '<div style="color:#aaa;">📷 RESİM YOK</div>'}
                <div style="font-weight:bold; margin-top:8px;">${escapeHtml(p.name)}</div><div>${p.barcode}</div>
                <div style="color:#ff6666;">${p.price.toFixed(2)} €</div><div>STOK: ${p.quantity}</div><div>SKT: ${p.expiry || "YOK"}</div>
                <div class="detail-actions">
                    <button onclick="editProductFromDetail(${idx})">✏️ DÜZENLE</button>
                    <button onclick="deleteProductFromModal(${idx})">🗑️ SİL</button>
                    <button onclick="addImageToProduct(${idx}, true)">📷 RESİM EKLE</button>
                </div>
            </div>
        `;
    }

    function editProductFromDetail(idx) {
        const p = products[idx];
        const detailArea = document.getElementById("productDetailArea");
        detailArea.innerHTML = `
            <div class="edit-form">
                <input type="text" id="editName" value="${escapeHtml(p.name)}" placeholder="ÜRÜN ADI">
                <input type="text" id="editBarcode" value="${p.barcode}" readonly>
                <input type="number" step="0.01" id="editPrice" value="${p.price}" placeholder="SATIŞ FİYATI (€)">
                <div class="calc-group">
                    <div class="calc-row"><label>💰 MALİYET (€)</label><input type="number" step="0.01" id="editCost" placeholder="Maliyet"></div>
                    <div class="calc-row"><label>📈 KAR (%)</label><input type="number" id="editProfit" placeholder="Kar %"></div>
                    <div class="calc-row"><label>🧾 VERGİ (%)</label><input type="number" id="editTax" placeholder="Vergi %" value="7"></div>
                    <button class="calc-button" onclick="calculateAndSetFor('edit')">🧮 HESAPLA</button>
                </div>
                <input type="number" id="editQuantity" value="${p.quantity}" placeholder="ADET">
                <input type="date" id="editExpiry" value="${p.expiry || ''}" placeholder="SKT">
                <div class="image-buttons">
                    <button onclick="openGoogleImageSearch('${encodeURIComponent(p.name)}')">🔍 GOOGLE'DA ARA</button>
                    <button onclick="addImageToProduct(${idx}, false)">📷 RESİM EKLE</button>
                </div>
                <button onclick="saveEditedProductFromDetail(${idx})">💾 KAYDET</button>
                <button onclick="showProductDetail(${idx})">İPTAL</button>
            </div>
        `;
    }

    function saveEditedProductFromDetail(idx) {
        const newName = document.getElementById("editName").value.trim().toUpperCase();
        const newPrice = parseFloat(document.getElementById("editPrice").value);
        const newQuantity = parseInt(document.getElementById("editQuantity").value);
        const newExpiry = document.getElementById("editExpiry").value;
        if(!newName || isNaN(newPrice) || isNaN(newQuantity)) { alert("GEÇERSİZ BİLGİ!"); return; }
        products[idx] = { ...products[idx], name: newName, price: newPrice, quantity: newQuantity, expiry: newExpiry };
        saveData(); updateSktButton(); showProductDetail(idx); playBeep();
    }

    function addImageToProduct(idx, refreshAfter) {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = "image/*";
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => { 
                    products[idx].image = ev.target.result; 
                    saveData(); 
                    if(refreshAfter) showProductDetail(idx);
                    else if(lastScannedProduct && lastScannedProduct.barcode === products[idx].barcode) showResult(lastScannedProduct);
                    playBeep();
                };
                reader.readAsDataURL(file);
            } else alert("Dosya seçilmedi!");
        };
        input.click();
    }

    function deleteProductFromModal(idx) {
        if(confirm(`${products[idx].name} SİLİNSİN Mİ?`)) { products.splice(idx,1); saveData(); updateSktButton(); openInventoryModal(); playBeep(); }
    }

    // ---------- ANA EKRAN ----------
    function showResult(product) {
        lastScannedProduct = product;
        const resultDiv = document.getElementById("resultArea");
        let imageHtml = product.image ? `<img src="${product.image}" class="product-image" onerror="this.onerror=null; this.src=''; this.alt='Resim yüklenemedi';">` : '<div style="color:#aaa;">📷 RESİM YOK</div>';
        resultDiv.innerHTML = `
            ${imageHtml}
            <div class="result-name">${escapeHtml(product.name)}</div>
            <div class="result-price">${product.price.toFixed(2)} €</div>
            <div style="color:#aaa;">STOK: ${product.quantity} | SKT: ${product.expiry || "YOK"}</div>
            <button class="edit-result-btn" onclick="enableInlineEdit()">📝 DÜZENLE</button>
        `;
        isEditMode = false;
    }

    function enableInlineEdit() {
        if(!lastScannedProduct) return;
        const p = lastScannedProduct;
        const resultDiv = document.getElementById("resultArea");
        resultDiv.innerHTML = `
            <div class="inline-edit-form">
                <input type="text" id="inlineName" value="${escapeHtml(p.name)}" placeholder="ÜRÜN ADI">
                <input type="number" step="0.01" id="inlinePrice" value="${p.price}" placeholder="SATIŞ FİYATI (€)">
                <div class="calc-group">
                    <div class="calc-row"><label>💰 MALİYET (€)</label><input type="number" step="0.01" id="inlineCost" placeholder="Maliyet"></div>
                    <div class="calc-row"><label>📈 KAR (%)</label><input type="number" id="inlineProfit" placeholder="Kar %"></div>
                    <div class="calc-row"><label>🧾 VERGİ (%)</label><input type="number" id="inlineTax" placeholder="Vergi %" value="7"></div>
                    <button class="calc-button" onclick="calculateAndSetFor('inline')">🧮 HESAPLA</button>
                </div>
                <input type="number" id="inlineQuantity" value="${p.quantity}" placeholder="ADET">
                <input type="date" id="inlineExpiry" value="${p.expiry || ''}" placeholder="SKT">
                <div class="image-buttons">
                    <button onclick="openGoogleImageSearch('${encodeURIComponent(p.name)}')">🔍 GOOGLE'DA ARA</button>
                    <button onclick="addImageToCurrentProduct()">📷 RESİM EKLE</button>
                </div>
                <button onclick="saveInlineEdit()">💾 KAYDET</button>
                <button onclick="showResult(lastScannedProduct)">İPTAL</button>
            </div>
        `;
        isEditMode = true;
    }

    function addImageToCurrentProduct() {
        if(!lastScannedProduct) return;
        const input = document.createElement("input");
        input.type = "file";
        input.accept = "image/*";
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const idx = products.findIndex(p => p.barcode === lastScannedProduct.barcode);
                    if(idx !== -1) {
                        products[idx].image = ev.target.result;
                        lastScannedProduct.image = ev.target.result;
                        saveData();
                        if(isEditMode) enableInlineEdit();
                        else showResult(lastScannedProduct);
                        playBeep();
                    } else alert("Ürün bulunamadı!");
                };
                reader.readAsDataURL(file);
            } else alert("Dosya seçilmedi!");
        };
        input.click();
    }

    function saveInlineEdit() {
        if(!lastScannedProduct) return;
        const newName = document.getElementById("inlineName").value.trim().toUpperCase();
        const newPrice = parseFloat(document.getElementById("inlinePrice").value);
        const newQuantity = parseInt(document.getElementById("inlineQuantity").value);
        const newExpiry = document.getElementById("inlineExpiry").value;
        if(!newName || isNaN(newPrice) || isNaN(newQuantity)) { alert("GEÇERSİZ BİLGİ!"); return; }
        const idx = products.findIndex(p => p.barcode === lastScannedProduct.barcode);
        if(idx !== -1) {
            products[idx] = { ...products[idx], name: newName, price: newPrice, quantity: newQuantity, expiry: newExpiry };
            lastScannedProduct = products[idx];
            saveData(); updateSktButton(); showResult(lastScannedProduct); playBeep();
        } else alert("Ürün bulunamadı!");
    }

    // ---------- MANUEL ARAMA ----------
    const searchInput = document.getElementById("manualSearchInput");
    const searchResultsDiv = document.getElementById("searchResults");
    searchInput.addEventListener("input", function() {
        const term = this.value.trim().toLowerCase();
        if (term === "") { searchResultsDiv.style.display = "none"; return; }
        const filtered = products.filter(p => p.name.toLowerCase().includes(term) || p.barcode.includes(term));
        if (filtered.length === 0) { searchResultsDiv.style.display = "none"; return; }
        let html = "";
        filtered.forEach(p => {
            html += `<div class="search-result-item" onclick="selectProductFromSearch('${p.barcode}')">
                        <div class="search-result-name">${escapeHtml(p.name)}</div>
                        <div class="search-result-price">${p.price.toFixed(2)} € | Stok: ${p.quantity}</div>
                        <div style="font-size:0.7rem;">${p.barcode}</div>
                    </div>`;
        });
        searchResultsDiv.innerHTML = html;
        searchResultsDiv.style.display = "block";
    });
    function selectProductFromSearch(barcode) {
        const product = products.find(p => p.barcode === barcode);
        if (product) { showResult(product); searchInput.value = ""; searchResultsDiv.style.display = "none"; }
    }
    document.addEventListener("click", function(e) {
        if (!searchInput.contains(e.target) && !searchResultsDiv.contains(e.target)) searchResultsDiv.style.display = "none";
    });

    // ---------- GOOGLE ARAMA ve SES ----------
    function openGoogleImageSearch(query) {
        window.open(`https://www.google.com/search?q=${query}&tbm=isch`, '_blank');
        alert("Google Görsel araması açıldı. Beğendiğiniz resmi indirip, ardından 'RESİM EKLE' butonu ile yükleyin.");
    }
    function playBeep() { try { const audioCtx = new (window.AudioContext || window.webkitAudioContext)(); const osc = audioCtx.createOscillator(); osc.type = "sine"; osc.frequency.value = 880; osc.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.15); audioCtx.resume(); } catch(e) {} }

    // ---------- KAMERA (OTOMATİK KAYDIRMA EKLENDİ) ----------
    async function openCamera(mode) {
        currentCameraMode = mode;
        const videoElem = document.getElementById("video");
        const container = document.getElementById("cameraContainer");
        const statusDiv = document.getElementById("cameraStatus");
        container.style.display = "block";
        statusDiv.innerHTML = "📷 KAMERA BAŞLATILIYOR...";
        
        // Sayfayı kamera konteynerine kaydır (yumuşak geçişle en üste)
        container.scrollIntoView({ behavior: 'smooth', block: 'start' });
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            videoElem.srcObject = stream; currentStream = stream; videoElem.play();
            Quagga.init({ inputStream: { name: "LiveStream", type: "LiveStream", target: videoElem }, decoder: { readers: ["ean_reader", "ean_8_reader", "code_128_reader", "upc_reader"] } }, function(err) { if(err) { statusDiv.innerHTML = "❌ HATA"; return; } Quagga.start(); statusDiv.innerHTML = "🎥 BARKODU GÖSTERİN..."; });
            Quagga.onDetected((data) => { const code = data.codeResult.code; playBeep(); closeCamera(); if(mode === 'search') { const found = products.find(p => p.barcode === code); if(found) showResult(found); else { document.getElementById("resultArea").innerHTML = `<div style="color:#ff6666; text-align:center; padding:20px;">❌ "${code}" BULUNAMADI<br><button onclick="showAddFormForBarcode('${code}')" style="background:#c0392b; border:none; border-radius:40px; padding:8px 16px; margin-top:10px; color:white;">➕ ÜRÜN EKLE</button></div>`; } } else if(mode === 'add') { showAddFormForBarcode(code); } });
        } catch(e) { statusDiv.innerHTML = "❌ KAMERA İZNİ GEREKLİ!"; }
    }

    let tempImageData = null;
    function showAddFormForBarcode(barcode) {
        const container = document.getElementById("addFormContainer");
        container.classList.remove("hidden");
        container.innerHTML = `
            <div class="add-product-form">
                <strong style="color:#ffaa88;">YENİ ÜRÜN EKLE</strong>
                <input type="text" id="addBarcode" value="${barcode}" readonly>
                <input type="text" id="addName" placeholder="ÜRÜN ADI">
                <input type="number" step="0.01" id="addPrice" placeholder="SATIŞ FİYATI (€)">
                <div class="calc-group">
                    <div class="calc-row"><label>💰 MALİYET (€)</label><input type="number" step="0.01" id="addCost" placeholder="Maliyet"></div>
                    <div class="calc-row"><label>📈 KAR (%)</label><input type="number" id="addProfit" placeholder="Kar %"></div>
                    <div class="calc-row"><label>🧾 VERGİ (%)</label><input type="number" id="addTax" placeholder="Vergi %" value="7"></div>
                    <button class="calc-button" onclick="calculateAndSetFor('add')">🧮 HESAPLA</button>
                </div>
                <input type="number" id="addQuantity" placeholder="ADET" value="1">
                <input type="date" id="addExpiry" placeholder="SKT (YYYY-AA-GG)">
                <div class="image-buttons">
                    <button onclick="openGoogleImageSearch(document.getElementById('addName').value)">🔍 GOOGLE'DA ARA</button>
                    <button onclick="captureImageForAdd()">📷 RESİM EKLE</button>
                </div>
                <button onclick="saveNewProduct()">💾 KAYDET</button>
                <button onclick="closeAddForm()" style="background:#555;">İPTAL</button>
            </div>
        `;
        document.getElementById("resultArea").innerHTML = `<div class="result-placeholder">🎯 BARKOD OKUTUNCA VEYA<br>MANUEL ARAMA YAPINCA<br>FİYAT GÖRÜNÜR</div>`;
    }

    function captureImageForAdd() {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = "image/*";
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (file) { const reader = new FileReader(); reader.onload = (ev) => { tempImageData = ev.target.result; alert("Resim yüklendi. Ürünü kaydettiğinizde eklenecektir."); }; reader.readAsDataURL(file); }
            else alert("Dosya seçilmedi!");
        };
        input.click();
    }

    function saveNewProduct() {
        const barcode = document.getElementById("addBarcode").value;
        const name = document.getElementById("addName").value.trim().toUpperCase();
        const price = parseFloat(document.getElementById("addPrice").value);
        const quantity = parseInt(document.getElementById("addQuantity").value) || 1;
        const expiry = document.getElementById("addExpiry").value;
        if(!name || isNaN(price)) { alert("ÜRÜN ADI VE FİYAT GEREKLİ!"); return; }
        const existing = products.findIndex(p => p.barcode === barcode);
        if(existing !== -1) {
            if(confirm("BARKOD ZATEN VAR! ÜZERİNE YAZILSIN MI?")) {
                products[existing] = { ...products[existing], name, price, quantity, expiry, image: tempImageData || products[existing].image };
                saveData(); alert("GÜNCELLENDİ");
            }
        } else {
            products.push({ barcode, name, price, quantity, expiry, priceHistory: [price], image: tempImageData });
            saveData(); alert("ÜRÜN EKLENDİ");
        }
        tempImageData = null; updateSktButton(); closeAddForm();
    }

    function closeAddForm() { document.getElementById("addFormContainer").classList.add("hidden"); document.getElementById("addFormContainer").innerHTML = ""; tempImageData = null; }
    function closeCamera() { if(Quagga) Quagga.stop(); if(currentStream) { currentStream.getTracks().forEach(t => t.stop()); currentStream = null; } document.getElementById("cameraContainer").style.display = "none"; const video = document.getElementById("video"); if(video.srcObject) video.srcObject = null; }
    function openSettingsModal() { document.getElementById("settingsModal").style.display = "flex"; }
    function closeSettingsModal() { document.getElementById("settingsModal").style.display = "none"; }
    function backupData() { const dataStr = JSON.stringify(products); const blob = new Blob([dataStr], {type: "application/json"}); const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `market_backup_${Date.now()}.json`; a.click(); alert("YEDEK ALINDI"); }
    function restoreData() { const input = document.createElement("input"); input.type = "file"; input.accept = "application/json"; input.onchange = e => { const file = e.target.files[0]; const reader = new FileReader(); reader.onload = ev => { try { products = JSON.parse(ev.target.result); saveData(); updateSktButton(); alert("YEDEK YÜKLENDİ"); } catch(err) { alert("HATALI DOSYA"); } }; reader.readAsText(file); }; input.click(); }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; return m; }); }

    // EVENT LISTENER'LAR
    document.getElementById("searchBtn").onclick = () => openCamera('search');
    document.getElementById("addBtn").onclick = () => openCamera('add');
    document.getElementById("inventoryBtn").onclick = () => openInventoryModal();
    document.getElementById("settingsBtn").onclick = () => openSettingsModal();
    document.getElementById("sktButton").onclick = () => openSktModal();

    loadData();
</script>
</body>
</html>

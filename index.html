<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Market Pro | SKT & Kamera</title>
    <script src="https://unpkg.com/@ericblade/quagga2@1.8.2/dist/quagga.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #e0cba0 0%, #d4b483 100%);
            padding: 16px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ANA KART (SABİT BOYUT) */
        .app-container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255, 248, 235, 0.96);
            border-radius: 56px;
            padding: 20px 18px;
            box-shadow: 0 25px 45px -12px black;
            backdrop-filter: blur(2px);
        }

        /* SKT UYARI ÇUBUĞU (Google arama çubuğu gibi) */
        .skt-bar {
            background: #ffecb3;
            border-radius: 60px;
            padding: 12px 18px;
            margin-bottom: 20px;
            font-weight: bold;
            text-align: center;
            font-size: 0.85rem;
            border-left: 5px solid #f39c12;
            color: #7b4a1e;
            transition: 0.2s;
        }
        .skt-bar.warning {
            background: #ffd6d6;
            border-left-color: #c0392b;
            color: #a82313;
        }

        /* BUTON GRUBU (4 buton, 2 satır) */
        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }
        .btn {
            border: none;
            padding: 14px 6px;
            border-radius: 60px;
            font-weight: 800;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            border: 1px solid #f0dbb4;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: #2c6e2f; color: white; border: none; }
        .btn-camera { background: #e67e22; color: white; border: none; }
        .btn-dark { background: #34495e; color: white; border: none; }
        .btn-outline { background: #f4e4c1; color: #7b3f00; }

        /* SONUÇ ALANI (ORTADA, BÜYÜK, GÖZ ALICI) */
        .result-area {
            background: #fff6e8;
            border-radius: 48px;
            padding: 24px 16px;
            margin: 16px 0;
            text-align: center;
            box-shadow: inset 0 0 0 2px white, 0 10px 20px rgba(0,0,0,0.1);
        }
        .result-price {
            font-size: 3.2rem;
            font-weight: 900;
            color: #c0392b;
            letter-spacing: -1px;
        }
        .result-name {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 6px;
        }
        .edit-result-btn {
            background: #f39c12;
            border: none;
            padding: 8px 20px;
            border-radius: 60px;
            font-weight: bold;
            margin-top: 12px;
            cursor: pointer;
        }

        /* KAMERA KONTEYNER */
        .video-wrapper {
            background: #1e1e1e;
            border-radius: 32px;
            overflow: hidden;
            margin: 12px 0;
            border: 2px solid #f1c40f;
        }
        video { width: 100%; display: block; }

        /* MODAL (Açılır pencere) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #fff6e8;
            width: 90%;
            max-width: 450px;
            border-radius: 48px;
            padding: 20px;
            max-height: 80%;
            overflow-y: auto;
        }
        .product-item-modal {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid #e2c294;
        }

        /* AYARLAR PANELİ */
        .settings-panel { display: none; margin-top: 20px; background: #fcf3e0; border-radius: 32px; padding: 16px; }
        .settings-panel button { margin: 6px 0; }

        /* KÜÇÜK YARDIMCI */
        .flex-btns { display: flex; gap: 10px; margin-top: 10px; }
        .mt-2 { margin-top: 10px; }
        .text-center { text-align: center; }
    </style>
</head>
<body>
<div class="app-container" id="appContainer">
    <!-- SKT UYARI ÇUBUĞU -->
    <div id="sktBar" class="skt-bar">✅ SKT yaklaşan ürün yok</div>

    <!-- 4 ANA BUTON -->
    <div class="button-grid">
        <button class="btn btn-camera" onclick="openCamera('search')">📷 Fiyat Sorgula</button>
        <button class="btn btn-camera" onclick="openCamera('add')">➕ Kamera Ekle</button>
        <button class="btn btn-primary" onclick="openInventoryModal()">📋 Envanter</button>
        <button class="btn btn-dark" onclick="toggleSettings()">⚙️ Ayarlar</button>
    </div>

    <!-- SONUÇ ALANI (ORTADA BÜYÜK) -->
    <div id="resultArea" class="result-area">
        <div style="opacity:0.6;">✨ Barkod okutunca burada görünür ✨</div>
    </div>

    <!-- KAMERA ALANI (GİZLİ) -->
    <div id="cameraContainer" style="display: none;">
        <div class="video-wrapper">
            <video id="video" autoplay muted playsinline></video>
        </div>
        <div class="flex-btns">
            <button onclick="closeCamera()" class="btn btn-outline" style="flex:1;">❌ Kapat</button>
        </div>
        <div id="cameraStatus" class="text-center mt-2" style="font-size:0.8rem;"></div>
    </div>

    <!-- AYARLAR PANELİ -->
    <div id="settingsPanel" class="settings-panel">
        <strong>⚙️ Ayarlar</strong>
        <button onclick="backupData()" class="btn btn-outline">💾 Yedek Al</button>
        <button onclick="restoreData()" class="btn btn-outline">📂 Geri Yükle</button>
        <button onclick="toggleDarkMode()" class="btn btn-outline">🌙 Gece Modu</button>
        <button onclick="toggleSound()" class="btn btn-outline">🔊 Ses Aç/Kapa</button>
        <button onclick="resetAllData()" class="btn btn-outline" style="background:#f9e0e0;">⚠️ Tüm Verileri Sıfırla</button>
        <button onclick="toggleSettings()" class="btn btn-outline">✖ Kapat</button>
    </div>

    <!-- ENVANTER MODAL (POP-UP) -->
    <div id="inventoryModal" class="modal">
        <div class="modal-content">
            <strong>📦 Envanter Listesi</strong>
            <div id="modalProductList" style="margin: 12px 0;"></div>
            <button onclick="closeInventoryModal()" class="btn btn-outline">Kapat</button>
        </div>
    </div>
</div>

<script>
    let products = [];
    let currentStream = null;
    let currentCameraMode = null;
    let soundEnabled = true;
    let lastScannedProduct = null;

    // ---------- Veri Yönetimi ----------
    function loadData() {
        const stored = localStorage.getItem("market_pro_v4");
        if(stored) products = JSON.parse(stored);
        else {
            products = [
                { barcode: "4003998000470", name: "Çaykur Rize Çayı", price: 4.99, quantity: 12, expiry: "2025-08-15", priceHistory: [4.99] },
                { barcode: "8690504003016", name: "Ülker Çikolata", price: 1.29, quantity: 30, expiry: "2025-06-20", priceHistory: [1.29] }
            ];
            saveData();
        }
        updateSktBar();
    }
    function saveData() { localStorage.setItem("market_pro_v4", JSON.stringify(products)); }

    // SKT BAR GÜNCELLEME
    function updateSktBar() {
        const today = new Date(); today.setHours(0,0,0,0);
        const warning = products.filter(p => {
            if(!p.expiry) return false;
            const diff = Math.ceil((new Date(p.expiry) - today) / (86400000));
            return diff >= 0 && diff <= 5;
        });
        const bar = document.getElementById("sktBar");
        if(warning.length === 0) {
            bar.innerHTML = "✅ SKT yaklaşan ürün yok";
            bar.classList.remove("warning");
        } else {
            bar.innerHTML = `⚠️ ${warning.length} ürünün SKT'sine 5 gün kaldı!`;
            bar.classList.add("warning");
        }
    }

    // SONUÇ GÖSTER (KALICI, BÜYÜK)
    function showPermanentResult(product) {
        lastScannedProduct = product;
        const resultDiv = document.getElementById("resultArea");
        resultDiv.innerHTML = `
            <div class="result-name">${escapeHtml(product.name)}</div>
            <div class="result-price">${product.price.toFixed(2)} €</div>
            <div>📦 Stok: ${product.quantity} | 📅 SKT: ${product.expiry || "Belirtilmemiş"}</div>
            <button class="edit-result-btn" onclick="editCurrentProduct()">✏️ Fiyat / Adı Düzenle</button>
        `;
    }

    function editCurrentProduct() {
        if(!lastScannedProduct) return;
        const newPrice = prompt("Yeni fiyat (€):", lastScannedProduct.price);
        if(newPrice && !isNaN(parseFloat(newPrice))) {
            lastScannedProduct.price = parseFloat(newPrice);
            if(!lastScannedProduct.priceHistory) lastScannedProduct.priceHistory = [];
            lastScannedProduct.priceHistory.push(parseFloat(newPrice));
            saveData();
            showPermanentResult(lastScannedProduct);
            showTemporaryMessage("Fiyat güncellendi!", "#2ecc71");
        }
    }

    // KAMERA (GEMINI ÇALIŞAN METOD)
    async function openCamera(mode) {
        currentCameraMode = mode;
        const videoElem = document.getElementById("video");
        const container = document.getElementById("cameraContainer");
        const statusDiv = document.getElementById("cameraStatus");
        container.style.display = "block";
        statusDiv.innerHTML = "📷 Kamera başlatılıyor...";
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            videoElem.srcObject = stream;
            currentStream = stream;
            videoElem.play();

            Quagga.init({
                inputStream: { name: "LiveStream", type: "LiveStream", target: videoElem },
                decoder: { readers: ["ean_reader", "ean_8_reader", "code_128_reader", "upc_reader"] }
            }, function(err) {
                if(err) { statusDiv.innerHTML = "❌ Hata"; return; }
                Quagga.start();
                statusDiv.innerHTML = "🎥 Barkodu gösterin...";
            });

            Quagga.onDetected((data) => {
                const code = data.codeResult.code;
                if(soundEnabled) playBeep();
                closeCamera();
                if(mode === 'search') {
                    const found = products.find(p => p.barcode === code);
                    if(found) showPermanentResult(found);
                    else {
                        document.getElementById("resultArea").innerHTML = `<div style="color:#c0392b;">❌ "${code}" bulunamadı. Ürün ekleyin.</div>`;
                        document.getElementById("barcodeInputForAdd").value = code;
                    }
                } else if(mode === 'add') {
                    document.getElementById("resultArea").innerHTML = `<div style="background:#f1c40f; border-radius:60px; padding:12px;">📦 Barkod: ${code}. Aşağıdaki formu kullanarak ürünü kaydedin.</div>`;
                    // Manuel ekleme için inputlara odaklanmak için basit bir modal yapabiliriz, hızlıca manuel ekleme alanı oluşturalım.
                    showManualAddForm(code);
                }
            });
        } catch(e) { statusDiv.innerHTML = "❌ Kamera izni gerekli!"; }
    }

    function showManualAddForm(barcode) {
        const name = prompt("Ürün adını girin:", "");
        const price = parseFloat(prompt("Fiyat (€):", "0"));
        const quantity = parseInt(prompt("Adet:", "1")) || 1;
        const expiry = prompt("SKT (YYYY-AA-GG) isteğe bağlı:", "");
        if(name && !isNaN(price)) {
            products.push({ barcode, name, price, quantity, expiry, priceHistory: [price] });
            saveData();
            updateSktBar();
            showTemporaryMessage(`${name} eklendi!`, "#2ecc71");
        }
    }

    function closeCamera() {
        if(Quagga) Quagga.stop();
        if(currentStream) { currentStream.getTracks().forEach(t => t.stop()); currentStream = null; }
        document.getElementById("cameraContainer").style.display = "none";
        const video = document.getElementById("video");
        if(video.srcObject) video.srcObject = null;
    }

    // ENVANTER MODAL
    function openInventoryModal() {
        const modal = document.getElementById("inventoryModal");
        const container = document.getElementById("modalProductList");
        if(products.length === 0) container.innerHTML = "<div>Ürün yok</div>";
        else {
            let html = "";
            products.forEach((p, idx) => {
                html += `<div class="product-item-modal">
                            <div><b>${escapeHtml(p.name)}</b><br>${p.barcode}<br>💰 ${p.price.toFixed(2)}€ | Stok:${p.quantity}</div>
                            <div><button onclick="quickEditProduct(${idx})" style="background:#e67e22; border:none; border-radius:40px; padding:6px 12px;">✏️</button></div>
                         </div>`;
            });
            container.innerHTML = html;
        }
        modal.style.display = "flex";
    }
    function closeInventoryModal() { document.getElementById("inventoryModal").style.display = "none"; }
    function quickEditProduct(idx) {
        const p = products[idx];
        const newPrice = prompt(`${p.name} için yeni fiyat:`, p.price);
        if(newPrice && !isNaN(parseFloat(newPrice))) {
            p.price = parseFloat(newPrice);
            if(!p.priceHistory) p.priceHistory = [];
            p.priceHistory.push(parseFloat(newPrice));
            saveData();
            openInventoryModal(); // yenile
            showTemporaryMessage("Güncellendi", "green");
        }
    }

    // AYARLAR
    function toggleSettings() {
        const panel = document.getElementById("settingsPanel");
        panel.style.display = panel.style.display === "none" ? "block" : "none";
    }
    function toggleDarkMode() { document.body.classList.toggle("dark-body"); }
    function toggleSound() { soundEnabled = !soundEnabled; showTemporaryMessage(`Ses ${soundEnabled ? "Açık" : "Kapalı"}`, "#34495e"); }
    function playBeep() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            osc.type = "sine";
            osc.frequency.value = 880;
            osc.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        } catch(e) {}
    }
    function backupData() {
        const dataStr = JSON.stringify(products);
        const blob = new Blob([dataStr], {type: "application/json"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `market_backup_${Date.now()}.json`;
        a.click();
        showTemporaryMessage("Yedek alındı", "#27ae60");
    }
    function restoreData() {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = "application/json";
        input.onchange = e => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = ev => {
                try {
                    products = JSON.parse(ev.target.result);
                    saveData();
                    updateSktBar();
                    showTemporaryMessage("Yedek yüklendi", "#2ecc71");
                } catch(err) { alert("Hatalı dosya"); }
            };
            reader.readAsText(file);
        };
        input.click();
    }
    function resetAllData() {
        if(confirm("TÜM VERİLER SİLİNECEK. Emin misiniz?")) {
            localStorage.removeItem("market_pro_v4");
            loadData();
            showTemporaryMessage("Veriler sıfırlandı", "#e67e22");
        }
    }
    function showTemporaryMessage(msg, color) {
        const resultDiv = document.getElementById("resultArea");
        const oldHtml = resultDiv.innerHTML;
        resultDiv.innerHTML = `<div style="background:${color}; border-radius:60px; padding:12px; color:white;">${msg}</div>`;
        setTimeout(() => { if(resultDiv.innerHTML.includes(msg)) resultDiv.innerHTML = oldHtml; }, 2000);
    }
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    // Dark mode css eklentisi
    const style = document.createElement('style');
    style.textContent = `.dark-body { background: #1e2a2a; } .dark-body .app-container { background: #2c2c2c; color:#f0e6d0; } .dark-body .result-area { background: #3a2a1a; } .dark-body .btn { background: #444; color:white; }`;
    document.head.appendChild(style);

    loadData();
</script>
</body>
</html>
